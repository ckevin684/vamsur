<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}canvas{display:block}</style>
</head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),G=c.getContext('2d');
// ═══ 해상도 시스템 ═══
// LW × LH: 게임 코드가 사용하는 논리 좌표 (780×560)
// canvasScale: 실제 내부 해상도 배율 (1x = 780×560 픽셀, 2x = 1560×1120 픽셀)
// 캔버스 내부 해상도와 CSS 표시 크기가 일치해서 스케일링 깨짐 없음
const LW=780,LH=560;
let canvasScale=1.5,canvasAutoFit=true;
function applyCanvasScale(){
  // 내부 해상도 = 논리 크기 × 배율 × DPR (Retina/HiDPI 대응)
  const dpr=window.devicePixelRatio||1;
  c.width=Math.floor(LW*canvasScale*dpr);
  c.height=Math.floor(LH*canvasScale*dpr);
  // CSS 표시 크기 = 논리 크기 × 배율
  c.style.width=Math.floor(LW*canvasScale)+'px';
  c.style.height=Math.floor(LH*canvasScale)+'px';
  // 모든 draw 호출이 논리 좌표(LW×LH)에서 작동하도록 변환 설정
  G._scale=canvasScale*dpr;
  G.setTransform(G._scale,0,0,G._scale,0,0);
  G.imageSmoothingEnabled=true;  // 부드러운 스케일링
}
function autoFitCanvas(){
  if(!canvasAutoFit)return;
  const wRatio=(window.innerWidth-30)/LW,hRatio=(window.innerHeight-30)/LH;
  canvasScale=Math.max(0.5,Math.min(wRatio,hRatio,3));
  applyCanvasScale();
}
window.addEventListener('resize',autoFitCanvas);
autoFitCanvas();

// ═══ AUDIO ═══
let AC=null;
function iac(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function tone(f,tp,d,v){try{iac();if(!AC)return;const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=tp||'square';o.frequency.setValueAtTime(f,AC.currentTime);g.gain.setValueAtTime((v||0.2)*sfxVol,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+(d||0.1));o.start();o.stop(AC.currentTime+(d||0.1))}catch(e){}}
function noise(d,v){try{iac();if(!AC)return;const s=AC.sampleRate,b=AC.createBuffer(1,s*d,s),dd=b.getChannelData(0);for(let i=0;i<dd.length;i++)dd[i]=Math.random()*2-1;const src=AC.createBufferSource(),g=AC.createGain();src.buffer=b;src.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(v*sfxVol,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);src.start();src.stop(AC.currentTime+d)}catch(e){}}
const SFX={
  shoot:()=>tone(420,'square',0.04,0.1),
  hit:()=>{noise(0.05,0.18);tone(150,'sawtooth',0.04,0.08)},
  pHit:()=>tone(200,'sawtooth',0.15,0.35),
  lvUp:()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.15,0.25),i*80)),
  gem:()=>tone(880,'sine',0.04,0.07),
  boss:()=>{tone(55,'sawtooth',0.8,0.5);setTimeout(()=>tone(45,'sawtooth',1.0,0.4),250)},
  evolve:()=>[400,600,800,1200].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.2,0.4),i*60)),
  over:()=>[400,330,270,200].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',0.3,0.35),i*150)),
  win:()=>[523,660,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.25,0.3),i*90)),
  bHit:()=>{noise(0.04,0.15);tone(180,'square',0.04,0.12)},
  elite:()=>tone(300,'sawtooth',0.2,0.3),
  slash:()=>{tone(700,'sawtooth',0.05,0.08);tone(450,'sawtooth',0.04,0.06)},
  thunder:()=>{noise(0.18,0.4);tone(80,'sawtooth',0.15,0.35);tone(50,'sawtooth',0.2,0.25)},
  phialReady:()=>[440,660,880,1320].forEach((f,i)=>setTimeout(()=>tone(f,'square',0.06,0.2),i*30)),
};

// ═══ BGM (실제 음악 파일) ═══
const BGM_TITLE=['bgm/캐릭선택창/Vinyl Choir.mp3'];
const BGM_BATTLE=[
  'bgm/배경음악/Crack-Bound Heartbeat.mp3',
  'bgm/배경음악/Crack-Bound Heartbeat (1).mp3',
  'bgm/배경음악/Grave Circuit.mp3',
  'bgm/배경음악/Grave Circuit (1).mp3',
];
let bgmAudio=null,bgmVol=0.5,sfxVol=0.7,bgmCategory='';
function playBgm(category){
  if(bgmCategory===category&&bgmAudio&&!bgmAudio.paused)return;  // 이미 재생 중
  if(bgmAudio){try{bgmAudio.pause()}catch(e){}bgmAudio=null}
  bgmCategory=category;
  const pool=category==='title'?BGM_TITLE:category==='battle'?BGM_BATTLE:null;
  if(!pool||!pool.length)return;
  const file=pool[Math.floor(Math.random()*pool.length)];
  bgmAudio=new Audio(encodeURI(file));
  bgmAudio.loop=true;
  bgmAudio.volume=bgmVol;
  bgmAudio.play().catch(e=>{/* autoplay 차단됨 - 사용자 인터랙션 후 다시 시도 */});
}
function stopBgm(){if(bgmAudio){try{bgmAudio.pause()}catch(e){}bgmAudio=null}bgmCategory=''}
function setBgmVol(v){bgmVol=Math.max(0,Math.min(1,v));if(bgmAudio)bgmAudio.volume=bgmVol}

// 뭉치 짖음 (절차적 SFX) — mp3 파일 없으면 두 번 연속 bHit 사운드로 폴백
function playBark(){SFX.bHit();SFX.bHit()}

// ═══ HELPERS ═══
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const rnd=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function shade(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${clamp(r+a,0,255)},${clamp(g+a,0,255)},${clamp(b+a,0,255)})`}

// ═══ SPRITES ═══
function shadow(x,y,rx,ry,al){G.save();G.fillStyle=`rgba(0,0,0,${al||0.4})`;G.beginPath();G.ellipse(x,y,rx,ry,0,0,Math.PI*2);G.fill();G.restore()}
function sChar(x,y,cd,fr,flashOn){
  if(flashOn)return;
  const col=cd.color,dk=shade(col,-55),lt=shade(col,30),vd=shade(col,-80);
  const sk='#ffd4a8',sk2='#d8a878';
  const t=fr%2,bob=t?0:-1,la=t?1:-1;
  // 그림자
  shadow(x,y+17,10,3);
  // 다리
  G.fillStyle=vd;G.fillRect(x-5,y+7,4,9+la);G.fillRect(x+1,y+7,4,9-la);
  // 신발
  G.fillStyle='#181818';G.fillRect(x-6,y+15+la,5,2);G.fillRect(x+1,y+15-la,5,2);
  G.fillStyle='#000';G.fillRect(x-6,y+16+la,5,1);G.fillRect(x+1,y+16-la,5,1);
  // 몸통
  const by=y-5+bob;
  G.fillStyle=col;G.fillRect(x-6,by,12,12);
  G.fillStyle=lt;G.fillRect(x-6,by,12,2);G.fillRect(x-6,by,1,12);
  G.fillStyle=shade(col,-30);G.fillRect(x+5,by,1,12);G.fillRect(x-6,by+10,12,2);
  G.fillStyle=dk;G.fillRect(x,by+2,1,10);
  // 팔
  G.fillStyle=dk;G.fillRect(x-9,by+1-la,3,7);G.fillRect(x+6,by+1+la,3,7);
  G.fillStyle=sk;G.fillRect(x-9,by+7-la,3,2);G.fillRect(x+6,by+7+la,3,2);
  // 목
  G.fillStyle=sk2;G.fillRect(x-2,y-6+bob,4,2);
  // 얼굴
  const hy=y-15+bob;
  G.fillStyle=sk;G.fillRect(x-5,hy+1,10,9);G.fillRect(x-6,hy+3,12,5);G.fillRect(x-4,hy,8,1);
  G.fillStyle=sk2;G.fillRect(x+4,hy+3,1,5);G.fillRect(x-5,hy+8,10,1);
  G.fillStyle='#ff9a9a';G.fillRect(x-4,hy+7,1,1);G.fillRect(x+3,hy+7,1,1);
  // 눈
  G.fillStyle='#fff';G.fillRect(x-4,hy+4,3,3);G.fillRect(x+1,hy+4,3,3);
  G.fillStyle='#1a1a1a';G.fillRect(x-3,hy+5,2,2);G.fillRect(x+2,hy+5,2,2);
  // 입
  G.fillStyle='#7a2a2a';G.fillRect(x-1,hy+9,2,1);
  // 캐릭터별 헤어/모자
  if(cd.id==='jh'){
    G.fillStyle='#1a3a5e';G.fillRect(x-6,hy-1,12,3);
    G.fillStyle='#225588';G.fillRect(x-5,hy-3,10,3);
    G.fillStyle='#336699';G.fillRect(x-4,hy-4,8,1);
    G.fillStyle='#88ccff';G.fillRect(x-1,hy-1,3,2);
    G.fillStyle='#1a3a5e';G.fillRect(x-9,hy+1,4,2);
  }else if(cd.id==='jw'){
    G.fillStyle='#ddd';G.fillRect(x-6,hy,12,2);
    G.fillStyle='#fff';G.fillRect(x-7,hy-7,14,7);
    G.fillRect(x-8,hy-10,16,4);
    G.fillStyle='#ccc';G.fillRect(x+5,hy-7,2,7);
    G.fillStyle='#222';G.fillRect(x-6,hy+1,1,2);G.fillRect(x+5,hy+1,1,2);
  }else if(cd.id==='sm'){
    G.fillStyle='#072a14';G.fillRect(x-7,hy-1,14,3);
    G.fillStyle='#116633';G.fillRect(x-5,hy-4,10,3);
    G.fillStyle='#0a3a1a';G.fillRect(x-4,hy-5,8,1);
    G.fillStyle='#ffcc00';G.fillRect(x-1,hy-2,3,2);
    G.fillStyle='#1a1a1a';G.fillRect(x-6,hy+1,2,4);G.fillRect(x+4,hy+1,2,4);
  }else if(cd.id==='gj'){
    G.fillStyle='#bbb';G.fillRect(x-6,hy,12,3);
    G.fillStyle='#ddd';G.fillRect(x-5,hy-2,10,2);
    G.fillStyle='#999';G.fillRect(x-4,hy-3,8,1);
    G.fillStyle='#aaa';G.fillRect(x-6,hy+3,1,3);G.fillRect(x+5,hy+3,1,3);
    G.fillStyle='#664422';G.fillRect(x+9,hy+2,2,28);
    G.fillStyle='#cc88ff';G.fillRect(x+8,hy-1,4,4);
    G.fillStyle='#ff88ff';G.fillRect(x+9,hy,2,2);
  }else if(cd.id==='co'){
    G.fillStyle='#222';G.fillRect(x-6,hy,12,3);G.fillRect(x-5,hy-1,10,1);
    G.fillStyle='#ff8800';G.fillRect(x-6,hy-4,2,3);G.fillRect(x-5,hy-6,1,2);
    G.fillRect(x+4,hy-4,2,3);G.fillRect(x+4,hy-6,1,2);
    G.fillStyle='#ffaa00';G.fillRect(x-5,hy-3,1,2);G.fillRect(x+5,hy-3,1,2);
  }else if(cd.id==='gh'){
    G.fillStyle='#181818';G.fillRect(x-6,hy-3,12,4);G.fillRect(x-5,hy-5,10,2);
    G.fillStyle='#ff2266';G.fillRect(x-7,hy,14,3);
    G.fillStyle='#ff5588';G.fillRect(x-7,hy,14,1);
    G.fillStyle='#cc1144';G.fillRect(x-7,hy+2,14,1);
  }
}
function sZombie(x,y,fr,hit,elite){
  const baseC=elite?'#88ee44':'#3a9d3a',col=hit?'#fff':baseC;
  const dk=hit?'#aaa':(elite?'#338822':'#1c5a1c'),lt=hit?'#fff':(elite?'#aaff66':'#5fc25f');
  const t=fr%2,bob=t?0:-1;
  // 그림자
  shadow(x,y+17,11,3,0.45);
  // 다리 (질질 끌기)
  G.fillStyle=dk;
  G.fillRect(x-5,y+7,4,10+(t?1:0));G.fillRect(x+1,y+7,4,10+(t?0:1));
  // 발
  G.fillStyle='#0a0a0a';G.fillRect(x-6,y+16,5,2);G.fillRect(x+1,y+16,5,2);
  // 팔 (앞으로 뻗음 - 좀비 자세)
  const ay=y-3+bob;
  G.fillStyle=dk;G.fillRect(x-14,ay+(t?0:1),8,4);G.fillRect(x+6,ay+(t?1:0),8,4);
  G.fillStyle=col;G.fillRect(x-16,ay-1+(t?0:1),3,5);G.fillRect(x+13,ay-1+(t?1:0),3,5);
  if(!hit){G.fillStyle='#440';G.fillRect(x-16,ay-2+(t?0:1),1,2);G.fillRect(x+15,ay-2+(t?1:0),1,2)}
  // 몸통
  const by=y-5+bob;
  G.fillStyle=col;G.fillRect(x-7,by,14,14);
  G.fillStyle=lt;G.fillRect(x-7,by,14,1);G.fillRect(x-7,by,1,14);
  G.fillStyle=dk;G.fillRect(x+6,by,1,14);G.fillRect(x-7,by+13,14,1);
  // 살점 갈라진 곳
  if(!hit){
    G.fillStyle='#5a1a1a';G.fillRect(x-3,by+4,3,2);G.fillRect(x+1,by+9,2,2);
    G.fillStyle='#aa3333';G.fillRect(x-3,by+4,1,1);
  }
  // 머리
  const hy=y-17+bob;
  G.fillStyle=col;G.fillRect(x-5,hy+1,10,10);G.fillRect(x-6,hy+3,12,6);G.fillRect(x-4,hy,8,1);
  G.fillStyle=lt;G.fillRect(x-5,hy+1,10,1);G.fillRect(x-6,hy+3,1,4);
  G.fillStyle=dk;G.fillRect(x+5,hy+3,1,5);G.fillRect(x-5,hy+10,10,1);
  // 눈
  if(!hit){
    G.fillStyle='#000';G.fillRect(x-4,hy+4,3,3);G.fillRect(x+1,hy+4,3,3);
    G.fillStyle='#ff2200';G.fillRect(x-3,hy+5,2,2);G.fillRect(x+2,hy+5,2,2);
    G.fillStyle='#ffaa00';G.fillRect(x-3,hy+5,1,1);G.fillRect(x+2,hy+5,1,1);
  }
  // 이빨
  if(!hit){
    G.fillStyle='#000';G.fillRect(x-3,hy+8,6,2);
    G.fillStyle='#fff';G.fillRect(x-3,hy+8,1,2);G.fillRect(x-1,hy+8,1,2);G.fillRect(x+1,hy+8,1,2);
  }
  // 엘리트 오라
  if(elite){
    G.save();G.strokeStyle='rgba(150,255,150,0.6)';G.lineWidth=1.5;
    G.shadowColor='#88ff44';G.shadowBlur=10;
    G.beginPath();G.ellipse(x,y,13,21,0,0,Math.PI*2);G.stroke();
    G.restore();
  }
}
function sBat(x,y,fr,hit,elite){
  const col=hit?'#fff':'#9955aa',wc=hit?'#888':'#5a1f6a',wd=hit?'#666':'#3a1244';
  const t=fr%2,fl=fr%4;
  // 그림자 (떠 있음)
  shadow(x,y+14,8,2.5,0.3);
  // 날개 (4프레임 펄럭임)
  const wA=[0,-6,0,4][fl];
  G.fillStyle=wd;
  // 왼쪽 날개 라인
  G.beginPath();
  G.moveTo(x-7,y-3);G.lineTo(x-22,y-6+wA);G.lineTo(x-20,y-2+wA);
  G.lineTo(x-15,y);G.lineTo(x-18,y+4+wA);G.lineTo(x-12,y+2);G.lineTo(x-7,y+3);
  G.closePath();G.fill();
  // 오른쪽 날개
  G.beginPath();
  G.moveTo(x+7,y-3);G.lineTo(x+22,y-6+wA);G.lineTo(x+20,y-2+wA);
  G.lineTo(x+15,y);G.lineTo(x+18,y+4+wA);G.lineTo(x+12,y+2);G.lineTo(x+7,y+3);
  G.closePath();G.fill();
  // 날개 안쪽 하이라이트
  G.fillStyle=wc;
  G.beginPath();G.moveTo(x-7,y-1);G.lineTo(x-18,y-3+wA*0.5);G.lineTo(x-14,y+1);G.lineTo(x-7,y+2);G.closePath();G.fill();
  G.beginPath();G.moveTo(x+7,y-1);G.lineTo(x+18,y-3+wA*0.5);G.lineTo(x+14,y+1);G.lineTo(x+7,y+2);G.closePath();G.fill();
  // 몸통
  G.fillStyle=col;G.fillRect(x-5,y-5,10,11);G.fillRect(x-4,y-7,8,2);
  G.fillStyle=shade(col,-30);G.fillRect(x+4,y-5,1,11);G.fillRect(x-5,y+5,10,1);
  // 귀
  G.fillStyle=wd;
  G.fillRect(x-5,y-10,2,4);G.fillRect(x-4,y-12,1,3);
  G.fillRect(x+3,y-10,2,4);G.fillRect(x+3,y-12,1,3);
  // 눈
  if(!hit){
    G.fillStyle='#000';G.fillRect(x-4,y-4,3,3);G.fillRect(x+1,y-4,3,3);
    G.fillStyle='#ff44ff';G.fillRect(x-3,y-3,2,2);G.fillRect(x+2,y-3,2,2);
    G.fillStyle='#fff';G.fillRect(x-3,y-3,1,1);G.fillRect(x+2,y-3,1,1);
  }
  // 송곳니
  if(!hit){G.fillStyle='#fff';G.fillRect(x-2,y+1,1,2);G.fillRect(x+1,y+1,1,2)}
  if(elite){G.save();G.strokeStyle='rgba(255,100,255,0.6)';G.lineWidth=1.5;G.shadowColor='#ff44ff';G.shadowBlur=10;G.beginPath();G.ellipse(x,y,20,12,0,0,Math.PI*2);G.stroke();G.restore()}
}
function sSkel(x,y,fr,hit,elite){
  const col=hit?'#fff':'#dcdcdc',dk=hit?'#888':'#888',md=hit?'#aaa':'#aaa';
  const t=fr%2,bob=t?0:-1;
  // 그림자
  shadow(x,y+17,9,3,0.4);
  // 다리
  G.fillStyle=col;
  G.fillRect(x-4,y+7,3,9+(t?1:0));G.fillRect(x+1,y+7,3,9+(t?0:1));
  G.fillStyle=dk;G.fillRect(x-4,y+10,3,1);G.fillRect(x+1,y+10,3,1);
  // 발
  G.fillStyle='#888';G.fillRect(x-5,y+15+(t?1:0),5,2);G.fillRect(x,y+15+(t?0:1),5,2);
  // 몸통 - 갈비뼈
  const by=y-7+bob;
  // 척추
  G.fillStyle=col;G.fillRect(x-1,by,2,14);
  // 갈비뼈
  if(!hit){
    G.fillStyle=md;
    [0,3,6,9].forEach(ry=>{
      G.fillRect(x-6,by+1+ry,5,1);G.fillRect(x+2,by+1+ry,5,1);
      G.fillRect(x-7,by+2+ry,1,1);G.fillRect(x+7,by+2+ry,1,1);
    });
    // 척추뼈 마디
    G.fillStyle=dk;
    [2,5,8,11].forEach(ry=>{G.fillRect(x-1,by+ry,2,1)});
  }
  // 골반
  G.fillStyle=col;G.fillRect(x-5,by+12,10,3);
  G.fillStyle=dk;G.fillRect(x-1,by+13,2,2);
  // 팔
  G.fillStyle=col;
  G.fillRect(x-9,by+(t?1:0),3,4);G.fillRect(x-9,by+4+(t?1:0),2,5);
  G.fillRect(x+6,by+(t?0:1),3,4);G.fillRect(x+7,by+4+(t?0:1),2,5);
  // 손가락
  if(!hit){G.fillStyle=md;G.fillRect(x-9,by+9+(t?1:0),2,1);G.fillRect(x+7,by+9+(t?0:1),2,1)}
  // 두개골
  const hy=y-19+bob;
  G.fillStyle=col;G.fillRect(x-5,hy+1,10,10);G.fillRect(x-6,hy+3,12,6);G.fillRect(x-4,hy,8,1);
  G.fillStyle=md;G.fillRect(x-5,hy+1,10,1);G.fillRect(x+5,hy+3,1,5);
  // 눈구멍
  if(!hit){
    G.fillStyle='#000';G.fillRect(x-4,hy+4,3,4);G.fillRect(x+1,hy+4,3,4);
    G.fillStyle='#88ccff';G.fillRect(x-3,hy+5,1,1);G.fillRect(x+2,hy+5,1,1);
  }
  // 코구멍
  if(!hit){G.fillStyle='#000';G.fillRect(x,hy+8,1,2)}

// 확률: BAL.rouletteProb 참조 (sleep + hina + 5명 균등)
function pickStreamerForm(){
  const P=BAL.rouletteProb;
  const r=Math.random();
  if(r<P.sleep)return STREAMER_FORMS[5];
  if(r<P.sleep+P.hina)return STREAMER_FORMS[6];
  const idx=Math.floor((r-(P.sleep+P.hina))/P.each);
  return STREAMER_FORMS[Math.min(idx,4)];
}

// 날씨 시스템
function updateWeather(dt){
  weatherT+=dt;
  if(flashT>0)flashT-=dt;
  // 8-15초마다 번개
  if(weatherT>rnd(8,15)){
    weatherT=0;flashT=0.4;
    setTimeout(()=>{if(state==='playing'&&!paused)flashT=0.25},250);
    // 천둥 (지연된 노이즈)
    setTimeout(()=>{try{iac();if(AC){const s=AC.sampleRate,b=AC.createBuffer(1,s*1.2,s),dd=b.getChannelData(0);for(let i=0;i<dd.length;i++){const env=Math.exp(-i/(s*0.5));dd[i]=(Math.random()*2-1)*env*0.5}const src=AC.createBufferSource(),g=AC.createGain();src.buffer=b;src.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(0.4,AC.currentTime);src.start();src.stop(AC.currentTime+1.2)}}catch(e){}},rnd(400,900));
  }
}
// BGM - 절차적 다크 앰비언트 (실제 mp3 사용으로 비활성화됨, 폴백용)
let bgmGain=null,bgmOscs=[],bgmStarted=false;
function startBgm_OLD_DISABLED(){
  if(bgmStarted)return;iac();if(!AC)return;
  bgmStarted=true;
  bgmGain=AC.createGain();bgmGain.gain.setValueAtTime(0.06,AC.currentTime);bgmGain.connect(AC.destination);
  // 베이스 드론 + 5도
  const bass=AC.createOscillator();bass.type='sawtooth';bass.frequency.value=55;
  const filt=AC.createBiquadFilter();filt.type='lowpass';filt.frequency.value=140;
  bass.connect(filt);filt.connect(bgmGain);bass.start();bgmOscs.push(bass);
  const fifth=AC.createOscillator();fifth.type='sawtooth';fifth.frequency.value=82.4;
  const filt2=AC.createBiquadFilter();filt2.type='lowpass';filt2.frequency.value=180;
  const g2=AC.createGain();g2.gain.value=0.5;
  fifth.connect(filt2);filt2.connect(g2);g2.connect(bgmGain);fifth.start();bgmOscs.push(fifth);
  // 멜로디 노트 시퀀스
  const notes=[220,261.63,196,164.81,220,293.66,246.94,196];
  let ni=0;
  setInterval(()=>{
    if(!AC||state!=='playing'||paused)return;
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='triangle';o.frequency.value=notes[ni%notes.length];
    g.gain.setValueAtTime(0,AC.currentTime);
    g.gain.linearRampToValueAtTime(0.5,AC.currentTime+0.05);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+1.2);
    o.connect(g);g.connect(bgmGain);o.start();o.stop(AC.currentTime+1.3);
    ni++;
  },1500);
}
function setBgmIntensity(boss){
  if(!bgmGain||!AC)return;
  const target=boss?0.12:0.06;
  bgmGain.gain.linearRampToValueAtTime(target,AC.currentTime+1);
}

// 픽업: heal / magnet / bomb
const PICKUP_TYPES=['heal','magnet','bomb'];
function spawnPickup(x,y,type){
  const t=type||PICKUP_TYPES[Math.floor(Math.random()*PICKUP_TYPES.length)];
  pickups.push({x,y,t,life:18,ml:18,dead:false,fr:Math.random()*Math.PI*2});
}
// 신경주사 — BAL.char.gj.injDistMin/Max 거리 무작위 방향에 1개 스폰
function spawnNerveInjection(p){
  const B=BAL.char.gj;
  const ang=Math.random()*Math.PI*2;
  const d=B.injDistMin+Math.random()*(B.injDistMax-B.injDistMin);
  const x=p.x+Math.cos(ang)*d, y=p.y+Math.sin(ang)*d;
  const pk={x,y,t:'injection',life:99999,ml:99999,dead:false,fr:Math.random()*Math.PI*2};
  pickups.push(pk);
  p.gjInjectionRef=pk;
}
function applyPickup(pk){
  if(pk.dead)return;  // 중복 적용 방지
  pk.dead=true;
  if(pk.t==='heal'){
    const heal=Math.max(20,Math.floor(player.mhp*0.35));
    player.hp=Math.min(player.mhp,player.hp+heal);
    showDmg(player.x,player.y-16,heal,'#88ff88',true);
    notify('💚 회복','+'+heal+' HP','#88ff88');
    SFX.gem();SFX.gem();
  }else if(pk.t==='magnet'){
    // 잠시 자석 범위 무한대로 → 모든 젬이 플레이어로 빨려옴
    player.magrBoost=0.8;
    const cnt=gems.length;
    notify('🧲 자석',`${cnt}개 젬 흡수`,'#aaccff');
    SFX.lvUp();
  }else if(pk.t==='bomb'){
    const r=320;
    (boss?[...enemies,boss]:enemies).forEach(e=>{
      const d=dist(player,e);if(d<r){const dmg=80*player.dm*(1+player.lv*0.1);e.hurt(dmg,false)}
    });
    spawnParts(player.x,player.y,'#ffaa44',40);
    shake(0.4,8);
    notify('💣 폭탄','광역 피해','#ffaa44');
    SFX.boss();
  }
}

// ═══ PLAYER ═══
class Player{
  constructor(cd){
    this.cd=cd;this.x=0;this.y=0;
    this.hp=cd.hp;this.mhp=cd.hp;
    this.spd=cd.spd;this.bspd=cd.spd;
    this.def=cd.def;this.lv=1;this.xp=0;this.xpn=15;
    this.dm=cd.id==='gj'?1.4:1;this.as=1;this.am=1;this.xpm=1;
    this.pierce=0;this.regen=0;this.iframes=1.2;
    this.hitT=0;this.regenT=0;this.regenLockT=0;this.magr=80;
    this.facing={x:1,y:0};
    this.passives={};  // {id: lv}
    this.wpns=[{type:cd.startWpn,t:0,lv:1}];
    this.flashT=0;this.bdm=1;this.crit=cd.id==='co'?BAL.char.co.critBase:0;
    this.itemLog=[];
    this.dashT=0;this.dashCd=0;this.dashCdMax=3;
    this.companions=[];this.magrBoost=0;
    this.bouncingRams=[];  // 준형 영구 RAM (매 발사마다 새로 안 만들고 갯수만 유지)
    // 차지 액스 페이얼 시스템
    this.cbGauge=0;
    this.cbMode='sword';
    this.cbAxeT=0;
    this.cbAxeMax=5;
    // 윤소민 스텔라이브 변신 시스템
    this.streamerForm=null;    // 현재 변신 (null = 평소)
    this.streamerT=30;         // 다음 룰렛까지 시간
    this.rouletteT=0;          // 룰렛 애니메이션 시간 (스핀+감속)
    this.rouletteResult=null;  // 룰렛 결과
    this.awaitingClick=false;  // 룰렛 끝난 후 결과 카드 클릭 대기 (true면 게임 정지)
    this.resultCardT=0;        // (deprecated, 호환용)
    // 준형전자 — 🔧 AS 보증 (HP 위급 시 자가 수리)
    this.repairCd=0;        // 0 이상: 사용 후 쿨다운 (초)
    this.repairFx=0;        // 발동 시 시각 이펙트 시간
    // 최종원 — 🍳 주문 폭주 (콤보 트리거 → 일정 시간 공속 2배)
    this.rushT=0;           // 활성 시간 (>0이면 발동 중)
    this.rushKills=0;       // 5초 윈도우 내 누적 킬
    this.rushWnd=0;         // 윈도우 카운트다운
    // 최기종 — 💥 분노/휠체어/신경주사 사이클 (discPain 누적 → 분노 → 휠체어)
    this.discPain=0;          // 0~1, 1 도달 시 분노 진입
    this.discFx=0;            // 분노 진입 시 시각 이펙트 (광역 폭발)
    this.gjPhase='normal';    // 'normal' | 'rage' | 'wheelchair'
    this.gjPhaseT=0;          // 분노 잔여 시간
    this.gjInjectionRef=null; // 현재 화면에 떠 있는 신경주사 (휠체어 모드 시 1개)
  }
  tryDash(){
    if(this.dashCd>0)return;
    this.dashT=0.18;this.dashCd=this.dashCdMax;this.hitT=Math.max(this.hitT,0.28);
    SFX.lvUp();spawnParts(this.x,this.y,this.cd.color,12);
  }
  update(dt){
    let dx=0,dy=0;
    if(keys['ArrowLeft']||keys['a']||keys['KeyA'])dx-=1;
    if(keys['ArrowRight']||keys['d']||keys['KeyD'])dx+=1;
    if(keys['ArrowUp']||keys['w']||keys['KeyW'])dy-=1;
    if(keys['ArrowDown']||keys['s']||keys['KeyS'])dy+=1;
    if(dx||dy){const l=Math.hypot(dx,dy);dx/=l;dy/=l;this.facing={x:dx,y:dy}}
    // 대시 처리 + 졸음 시 이동속도 절반 + 휠체어 시 이동속도 +70%
    const sleepNerf=(this.streamerForm&&this.streamerForm.id==='sleep')?0.5:1;
    const wheelSpdBoost=(this.cd.id==='gj'&&this.gjPhase==='wheelchair')?BAL.char.gj.wheelSpdMul:1;
    const dashSpd=(this.dashT>0?this.spd*4.5:this.spd)*sleepNerf*wheelSpdBoost;
    const mvX=this.dashT>0?this.facing.x:dx,mvY=this.dashT>0?this.facing.y:dy;
    this.x+=mvX*dashSpd*dt;this.y+=mvY*dashSpd*dt;
    if(this.dashT>0){this.dashT-=dt;if(Math.random()<0.6)spawnParts(this.x,this.y,this.cd.color,1)}
    if(this.dashCd>0)this.dashCd-=dt;
    if(this.magrBoost>0)this.magrBoost-=dt;
    // 차지 액스 도끼 모드 시간 감소
    if(this.cbMode==='axe'){
      this.cbAxeT-=dt;
      this.cbGauge=Math.max(0,this.cbAxeT/this.cbAxeMax);
      if(this.cbAxeT<=0){this.cbMode='sword';this.cbGauge=0}
    }
    // 윤소민 스텔라이브 변신 - 30초마다 룰렛 트리거 (룰렛 진행은 update()에서)
    if(this.cd.id==='sm'){
      this.streamerT-=dt;
      if(this.streamerT<=0&&this.rouletteT<=0&&!this.awaitingClick){
        this.rouletteT=3.8;  // 더 길게 (감속 위해)
        this.rouletteResult=pickStreamerForm();
        this.streamerT=30;  // 다음 사이클까지 막기
        SFX.lvUp();
      }
    }
    this.x=clamp(this.x,-1800,1800);this.y=clamp(this.y,-1800,1800);
    if(this.hitT>0)this.hitT-=dt;
    if(this.flashT>0)this.flashT-=dt;
    // 최종원 주문 폭주 활성 시 발사 속도 ×2 / 기종 분노/휠체어 — BAL 참조
    const rushAsMul=(this.cd.id==='jw'&&this.rushT>0)?BAL.char.jw.rushAsMul:1;
    const gjAsMul=(this.cd.id==='gj'&&this.gjPhase==='rage')?BAL.char.gj.rageAsMul:(this.cd.id==='gj'&&this.gjPhase==='wheelchair')?BAL.char.gj.wheelAsMul:1;
    this.wpns.forEach(w=>{
      w.t-=dt;
      if(w.t<=0){fireWpn(w.type,this,w.lv||1);w.t=(WDEFS[w.type]?.cd||1)*wlvAt(WLV.cdM,w.lv||1)/(this.as*rushAsMul*gjAsMul)}
    });
    // HP 회복 — 비전투 시에만 작동 (피격 후 regenLockT 2초간 잠금, 휠체어 시 잠금)
    if(this.regenLockT>0)this.regenLockT-=dt;
    const wheelRegenLock=(this.cd.id==='gj'&&this.gjPhase==='wheelchair');
    if(this.regen>0&&this.regenLockT<=0&&!wheelRegenLock){this.regenT=Math.max(0,this.regenT-dt);if(this.regenT<=0){this.hp=Math.min(this.mhp,this.hp+this.regen*0.2);this.regenT=0.2}}
    if(this.cd.id==='jw')this.dm=1+(gameTime/BAL.char.jw.lateScaleStart)*BAL.char.jw.lateScaleRate;
    // 캐릭터별 메카닉 타이머
    if(this.repairCd>0)this.repairCd-=dt;
    if(this.repairFx>0)this.repairFx-=dt;
    if(this.discFx>0)this.discFx-=dt;
    // 최종원 — 콤보 윈도우 카운트다운 (5초 안에 8킬 도달해야 발동)
    if(this.cd.id==='jw'){
      if(this.rushWnd>0){
        this.rushWnd-=dt;
        if(this.rushWnd<=0)this.rushKills=0;
      }
      if(this.rushT>0)this.rushT-=dt;
    }
    // 최기종 — 누적 게이지 자연 감소 + 분노 타이머 + 휠체어 신경주사 추적
    if(this.cd.id==='gj'){
      // 정상 상태에서 게이지 자연 감소 (오래 안 맞으면 천천히 빠짐)
      if(this.gjPhase==='normal'&&this.discPain>0&&this.hitT<=0){
        this.discPain=Math.max(0,this.discPain-dt*0.04);
      }
      // 분노 카운트다운 → 종료 시 휠체어 진입
      if(this.gjPhase==='rage'){
        this.gjPhaseT-=dt;
        if(this.gjPhaseT<=0)this.enterWheelchair();
      }
      // 휠체어 모드에서 신경주사 픽업 체크 (gjInjectionRef를 가까이 가서 만나면 발동)
      if(this.gjPhase==='wheelchair'&&this.gjInjectionRef){
        const ref=this.gjInjectionRef;
        if(ref.dead||!ref){
          // 어디론가 사라졌으면 새로 스폰
          spawnNerveInjection(this);
        }else if(dist(this,ref)<this.spd*0.4){
          // 가까이 가면 픽업
          ref.dead=true;
          this.exitWheelchair();
        }
      }
    }
  }
  // 최종원 — 처치 1건 알림 — BAL.char.jw 참조
  notifyKill(){
    if(this.cd.id!=='jw')return;
    if(this.rushT>0)return;
    const B=BAL.char.jw;
    this.rushKills++;
    this.rushWnd=B.rushWnd;
    if(this.rushKills>=B.rushKills){
      this.rushT=B.rushDur;
      this.rushKills=0;this.rushWnd=0;
      SFX.lvUp();SFX.phialReady();
      notify('🍳 주문 폭주!',`${B.rushDur}초간 공속 ×${B.rushAsMul}`,'#ff8844');
      spawnParts(this.x,this.y,'#ff8844',14);
      shake(0.15,3);
    }
  }
  nearest(){let n=null,md=99999;(boss?[...enemies,boss]:enemies).forEach(e=>{const d=dist(this,e);if(d<md){md=d;n=e}});return n}
  takeDmg(v){
    if(this.hitT>0)return;
    // 최기종 분노 모드 무적
    if(this.cd.id==='gj'&&this.gjPhase==='rage')return;
    const dmg=v*this.def;
    this.hp-=dmg;this.hitT=this.iframes;this.flashT=0.25;
    this.regenLockT=BAL.regen.combatLockDur;  // 전투 중 회복 정지
    SFX.pHit();spawnParts(this.x,this.y,'#ff4444',8);
    showDmg(this.x,this.y-12,dmg,'#ff5566',true);
    shake(0.25,5);spark(this.x,this.y,'#ff6644',6);
    // 최기종 — 누적 데미지 게이지 (정상 상태에서만 충전): painTrigger 도달 시 분노
    if(this.cd.id==='gj'&&this.gjPhase==='normal'&&this.hp>0){
      this.discPain=Math.min(1,this.discPain+(dmg/this.mhp)*BAL.char.gj.painPerHit);
      if(this.discPain>=BAL.char.gj.painTrigger)this.triggerRage();
    }
    if(this.hp<=0){
      // 준형전자 — AS 보증: HP 0 이하 도달 시 쿨다운 가능하면 자동 수리 (긴급)
      if(this.cd.id==='jh'&&this.repairCd<=0){
        this.triggerASRepair(true);
        return;
      }
      this.hp=0;SFX.over();state='dead';shake(0.6,12);
      return;
    }
    // 준형전자 — AS 보증: HP 25% 이하 + 쿨다운 끝났을 때 자동 발동
    if(this.cd.id==='jh'&&this.repairCd<=0&&this.hp/this.mhp<0.25){
      this.triggerASRepair(false);
    }
  }
  // 준형전자 자가수리 — BAL.char.jh 참조
  triggerASRepair(emergency){
    const B=BAL.char.jh;
    const healAmt=this.mhp*(emergency?B.healUrgentPct:B.healPct);
    this.hp=Math.min(this.mhp,Math.max(this.hp,0)+healAmt);
    this.hitT=Math.max(this.hitT,B.healInvuln);
    this.repairCd=B.repairCd;
    this.repairFx=1.2;
    SFX.lvUp();SFX.phialReady();
    notify(emergency?'🔧 긴급 부팅!':'🔧 AS 보증 발동',`HP +${Math.round(healAmt)} · ${B.healInvuln}초 무적`,'#44aaff');
    spawnParts(this.x,this.y,'#44aaff',16);
    shake(0.2,4);
    showDmg(this.x,this.y-20,Math.round(healAmt),'#88ddff',true);
  }
  // 최기종 분노 진입 — BAL.char.gj 참조
  triggerRage(){
    const B=BAL.char.gj;
    this.gjPhase='rage';
    this.gjPhaseT=B.rageDur;
    this.discFx=0.8;
    const bdmg=20*this.dm*B.rageBurstDmgMul;
    aoeHit(this.x,this.y,B.rageBurstR,'#ff3366',bdmg,0.5,0,false,'disc_burst',0);
    SFX.bHit();SFX.boss();
    notify('🔥 허리 부러짐 — 분노!',`${B.rageDur}초 광폭 (dmg×${B.rageDmgMul})`,'#ff3366');
    spawnParts(this.x,this.y,'#ff3366',24);
    spawnParts(this.x,this.y,'#ff66aa',16);
    shake(0.5,8);
  }
  // 분노 종료 → 휠체어 진입
  enterWheelchair(){
    this.gjPhase='wheelchair';
    this.gjPhaseT=0;
    this.discPain=0;
    notify('🦽 휠체어 모드','💉 신경주사 찾기 (멀리 스폰)','#88aaff');
    SFX.over();
    spawnNerveInjection(this);
  }
  // 신경주사 픽업 → 정상 복귀
  exitWheelchair(){
    const B=BAL.char.gj;
    this.gjPhase='normal';
    this.discPain=0;
    this.gjInjectionRef=null;
    this.hp=Math.min(this.mhp,this.hp+this.mhp*B.injHealPct);
    this.hitT=Math.max(this.hitT,B.injInvuln);
    notify('💉 신경주사 회복',`정상 복귀 · HP +${Math.round(B.injHealPct*100)}%`,'#88ff88');
    SFX.lvUp();SFX.phialReady();
    spawnParts(this.x,this.y,'#88ff88',20);
  }
  gainXp(v){
    this.xp+=v*this.xpm;
    while(this.xp>=this.xpn){
      this.xp-=this.xpn;this.lv++;this.xpn=Math.floor(this.xpn*1.18);
      spawnLvUpBurst();
      if(state==='levelup')pendingLvUps++;
      else triggerLvUp();
    }
  }
  hasP(id){return (this.passives[id]||0)>0}
  pLv(id){return this.passives[id]||0}
  pCnt(){return Object.keys(this.passives).length}
  hasW(t){return this.wpns.some(w=>w.type===t)}
  wpnObj(t){return this.wpns.find(w=>w.type===t)}
  draw(){
    const fl=this.flashT>0&&Math.floor(this.hitT*14)%2===0;
    if(this.hitT>0&&Math.floor(this.hitT*14)%2===1)return;
    // 분노 모드 빨간 오라 (캐릭터 뒤에 그리기)
    if(this.cd.id==='gj'&&this.gjPhase==='rage'){
      const pulse=0.5+0.5*Math.sin(gameTime*12);
      G.save();
      G.globalAlpha=0.5+pulse*0.3;
      G.fillStyle='#ff2244';
      G.beginPath();G.arc(this.x,this.y,22+pulse*4,0,Math.PI*2);G.fill();
      G.globalAlpha=0.3;
      G.fillStyle='#ff6688';
      G.beginPath();G.arc(this.x,this.y,32+pulse*6,0,Math.PI*2);G.fill();
      G.restore();
    }
    G.save();G.translate(this.x,this.y);
    // 기종 분노 시 캐릭터 90도 꺾임 (허리 부러진 느낌)
    if(this.cd.id==='gj'&&this.gjPhase==='rage'){
      G.rotate(Math.PI/2);
    }
    const sx=this.facing.x<0?-0.72:0.72;
    G.scale(sx,0.72);G.translate(-this.x,-this.y);
    sChar(this.x,this.y,this.cd,afr,fl);
    // 윤소민 변신 시 외형 액세서리
    if(!fl&&this.cd.id==='sm'&&this.streamerForm&&this.rouletteT<=0){
      drawStreamerAccessory(this.x,this.y,this.streamerForm);
    }
    G.restore();
    if(fl){G.save();G.globalAlpha=this.flashT*2;G.fillStyle='#ff4444';G.fillRect(this.x-9,this.y-16,18,30);G.restore()}
    // 캐릭터별 시각 이펙트
    // 준형전자 AS 보증 발동 직후: 파란 회로 글로우 링
    if(this.cd.id==='jh'&&this.repairFx>0){
      const t=1-this.repairFx/1.2;
      G.save();
      G.globalAlpha=(1-t)*0.85;
      G.strokeStyle='#44ccff';G.lineWidth=3;
      G.beginPath();G.arc(this.x,this.y,16+t*30,0,Math.PI*2);G.stroke();
      G.globalAlpha=(1-t)*0.5;
      G.strokeStyle='#aaeeff';G.lineWidth=1.5;
      G.beginPath();G.arc(this.x,this.y,10+t*22,0,Math.PI*2);G.stroke();
      // 🔧 위 표시
      G.globalAlpha=Math.min(1,(1-t)*1.4);
      G.font='14px serif';G.textAlign='center';
      G.fillText('🔧',this.x,this.y-22-t*8);
      G.restore();
    }
    // 최종원 주문 폭주 활성 중: 🍳 위에 + 주황 글로우
    if(this.cd.id==='jw'&&this.rushT>0){
      const pulse=0.5+0.5*Math.sin(gameTime*10);
      G.save();
      G.globalAlpha=0.3+pulse*0.3;
      G.fillStyle='#ff8844';
      G.beginPath();G.arc(this.x,this.y+2,15+pulse*3,0,Math.PI*2);G.fill();
      G.globalAlpha=1;
      G.font='14px serif';G.textAlign='center';
      G.fillText('🍳',this.x,this.y-22);
      // 잔여 시간 바
      G.fillStyle='#332211';G.fillRect(this.x-12,this.y-30,24,3);
      G.fillStyle='#ff8844';G.fillRect(this.x-12,this.y-30,24*(this.rushT/5),3);
      G.restore();
    }
    // 최기종 정상 상태 통증 게이지 (머리 위 보라 바)
    if(this.cd.id==='gj'&&this.gjPhase==='normal'&&this.discPain>0){
      G.save();
      const w=22,h=4,bx=this.x-w/2,by=this.y-26;
      G.fillStyle='rgba(20,10,30,0.85)';G.fillRect(bx,by,w,h);
      const col=this.discPain>=0.85?'#ff66cc':'#9966cc';
      G.fillStyle=col;G.fillRect(bx,by,w*this.discPain,h);
      if(this.discPain>=0.85){
        const p=0.5+0.5*Math.sin(gameTime*18);
        G.globalAlpha=p*0.7;
        G.strokeStyle='#ff66cc';G.lineWidth=2;G.strokeRect(bx-1,by-1,w+2,h+2);
      }
      G.restore();
    }
    // 분노 진입 임팩트: 큰 빨간 슬램 링
    if(this.cd.id==='gj'&&this.discFx>0){
      const t=1-this.discFx/0.8;
      G.save();
      G.globalAlpha=(1-t)*0.9;
      G.strokeStyle='#ff3366';G.lineWidth=5-t*3;
      G.beginPath();G.arc(this.x,this.y,40+t*180,0,Math.PI*2);G.stroke();
      G.strokeStyle='#fff';G.lineWidth=2-t;
      G.beginPath();G.arc(this.x,this.y,30+t*160,0,Math.PI*2);G.stroke();
      G.restore();
    }
    // 휠체어 모드: 캐릭터 아래에 휠체어 그림
    if(this.cd.id==='gj'&&this.gjPhase==='wheelchair'){
      G.save();
      const cx=this.x,cy=this.y+8;
      // 프레임 (회색)
      G.fillStyle='#555';G.fillRect(cx-9,cy-2,18,3);  // 좌석 가로 프레임
      G.fillStyle='#444';G.fillRect(cx+7,cy-12,2,12); // 등받이 (오른쪽)
      G.fillStyle='#666';G.fillRect(cx-9,cy-12,2,12); // 등받이 (왼쪽)
      // 큰 바퀴 (양쪽)
      G.fillStyle='#1a1a1a';
      G.beginPath();G.arc(cx-7,cy+5,7,0,Math.PI*2);G.fill();
      G.beginPath();G.arc(cx+7,cy+5,7,0,Math.PI*2);G.fill();
      G.fillStyle='#333';
      G.beginPath();G.arc(cx-7,cy+5,4,0,Math.PI*2);G.fill();
      G.beginPath();G.arc(cx+7,cy+5,4,0,Math.PI*2);G.fill();
      // 바퀴 살 (회전 효과)
      const spin=gameTime*4;
      G.strokeStyle='#888';G.lineWidth=1;
      [0,Math.PI/3,2*Math.PI/3].forEach(a=>{
        G.beginPath();G.moveTo(cx-7+Math.cos(a+spin)*5,cy+5+Math.sin(a+spin)*5);
        G.lineTo(cx-7-Math.cos(a+spin)*5,cy+5-Math.sin(a+spin)*5);G.stroke();
        G.beginPath();G.moveTo(cx+7+Math.cos(a-spin)*5,cy+5+Math.sin(a-spin)*5);
        G.lineTo(cx+7-Math.cos(a-spin)*5,cy+5-Math.sin(a-spin)*5);G.stroke();
      });
      // 작은 앞 바퀴
      G.fillStyle='#222';
      G.beginPath();G.arc(cx-5,cy+9,2,0,Math.PI*2);G.fill();
      G.beginPath();G.arc(cx+5,cy+9,2,0,Math.PI*2);G.fill();
      G.restore();
    }
  }
}

// ═══ WEAPON FIRE ═══
function fireWpn(type,p,wlv){
  wlv=wlv||1;
  const dM=wlvAt(WLV.dmgM,wlv),pB=wlvAt(WLV.pierceB,wlv);
  // 기종 모드별 데미지/범위 모디파이어 — BAL.char.gj 참조
  const gjB=BAL.char.gj;
  const gjRageMul=(p.cd.id==='gj'&&p.gjPhase==='rage')?gjB.rageDmgMul:1;
  const gjWheelDmgMul=(p.cd.id==='gj'&&p.gjPhase==='wheelchair')?gjB.wheelDmgMul:1;
  const gjWheelAmMul=(p.cd.id==='gj'&&p.gjPhase==='wheelchair')?gjB.wheelAmMul:1;
  const dmg=18*p.dm*dM*(1+Math.max(0,p.lv-1)*0.04)*gjRageMul*gjWheelDmgMul;
  const am=p.am*gjWheelAmMul,pierce=p.pierce+pB; // 크기는 패시브만 영향, 레벨로는 안 커짐
  const t=p.nearest(),ang=t?Math.atan2(t.y-p.y,t.x-p.x):Math.atan2(p.facing.y,p.facing.x);
  // 부채꼴 발사 헬퍼
  const fan=(n,spread,sp,life,col,sz,extraP,wt,dmgMul)=>{
    SFX.shoot();
    if(n<=1){projs.push(new Proj(p.x,p.y,Math.cos(ang)*sp,Math.sin(ang)*sp,dmg*(dmgMul||1),life,col,sz*am,pierce+(extraP||0),wt));return}
    for(let i=0;i<n;i++){
      const da=-spread/2+spread*(i/(n-1));
      const a=ang+da;
      projs.push(new Proj(p.x,p.y,Math.cos(a)*sp,Math.sin(a)*sp,dmg*(dmgMul||1),life,col,sz*am,pierce+(extraP||0),wt));
    }
  };
  switch(type){
    case 'ram':{
      // RAM 스틱: 영구 1개 유지 (매 발사마다 새로 안 만들고 갯수만 조정)
      // 레벨업은 데미지/속도/크기/타격 빈도 스케일
      if(!p.bouncingRams)p.bouncingRams=[];
      // 죽은 RAM 제거
      p.bouncingRams=p.bouncingRams.filter(r=>!r.dead);
      const wantCount=1; // 기본 1개 영구
      const ramDmg=dmg*1.4; // 단발 1개라 데미지 강화 (cd마다 새로 안 만드니 DPS 보상)
      const ramSpd=220+wlv*10; // 레벨 따라 빠름 (Lv1: 230, Lv8: 300)
      const ramSz=(9+wlv*0.3)*am; // 레벨 따라 살짝 큼 (Lv1: 9.3, Lv8: 11.4)
      // 능력치 동기화 (레벨업 시 즉시 반영)
      p.bouncingRams.forEach(r=>{
        r.dmg=ramDmg; r.sz=ramSz; r.col='#44aaff'; r.fancy=false;
        const cur=Math.hypot(r.vx,r.vy)||1;
        // 속도가 수직/수평에 너무 치우쳤거나 0에 가까우면 재랜덤화 (자가 치유)
        if(Math.abs(r.vx)<ramSpd*0.3||Math.abs(r.vy)<ramSpd*0.3){
          const q=Math.floor(Math.random()*4);
          const a=q*Math.PI/2+rnd(Math.PI/7,Math.PI/2-Math.PI/7);
          r.vx=Math.cos(a)*ramSpd; r.vy=Math.sin(a)*ramSpd;
        }else{
          r.vx=r.vx/cur*ramSpd; r.vy=r.vy/cur*ramSpd;
        }
        r.spdBase=ramSpd;
      });
      // 부족하면 새로 추가
      while(p.bouncingRams.length<wantCount){
        const r=spawnBouncingRam(p,{
          dmg:ramDmg, persistent:true, speed:ramSpd,
          col:'#44aaff', sz:ramSz, wt:'ram_bounce'
        });
        p.bouncingRams.push(r);
        SFX.shoot();
      }
      // 초과면 제거 (현재 디자인에선 안 일어남)
      while(p.bouncingRams.length>wantCount){
        const r=p.bouncingRams.pop();
        r.dead=true;
      }
      break;
    }
    case 'fullspec':{
      // 풀스펙 진화: 영구 2개 + 빠르고 강함 + 발광
      if(!p.bouncingRams)p.bouncingRams=[];
      p.bouncingRams=p.bouncingRams.filter(r=>!r.dead);
      const wantCount=2;
      const ramDmg=dmg*BAL.wpn.fullspec.dmgMul;
      const ramSpd=270+wlv*12;
      const ramSz=(10+wlv*0.3)*am;
      p.bouncingRams.forEach(r=>{
        r.dmg=ramDmg; r.sz=ramSz; r.col='#00eeff'; r.fancy=true;
        const cur=Math.hypot(r.vx,r.vy)||1;
        if(Math.abs(r.vx)<ramSpd*0.3||Math.abs(r.vy)<ramSpd*0.3){
          const q=Math.floor(Math.random()*4);
          const a=q*Math.PI/2+rnd(Math.PI/7,Math.PI/2-Math.PI/7);
          r.vx=Math.cos(a)*ramSpd; r.vy=Math.sin(a)*ramSpd;
        }else{
          r.vx=r.vx/cur*ramSpd; r.vy=r.vy/cur*ramSpd;
        }
        r.spdBase=ramSpd;
      });
      while(p.bouncingRams.length<wantCount){
        const r=spawnBouncingRam(p,{
          dmg:ramDmg, persistent:true, speed:ramSpd,
          col:'#00eeff', sz:ramSz, wt:'fullspec_bounce', fancy:true
        });
        p.bouncingRams.push(r);
        // 진화 직후 임팩트 플래시
        aoeHit(p.x,p.y,55*am,'#ffffff',dmg*0.4,0.2,0,false,'flash',0);
        SFX.shoot();
      }
      while(p.bouncingRams.length>wantCount){
        const r=p.bouncingRams.pop();
        r.dead=true;
      }
      break;
    }
    case 'knife':      fan(wlvAt(WPROJ.knife,wlv),0.6,310,1.5,'#ff8844',7,0,'knife',1);break;
    case 'fullcourse': fan(wlvAt(WPROJ.fullcourse,wlv),0.85,340,1.5,'#ff5500',9,0,'fullcourse',1.3);break;
    case 'light':{
      // 윤소민 변신 효과 적용 (변신 시 변신별 빔)
      const form=(p.cd.id==='sm'&&p.streamerForm)?p.streamerForm:null;
      if(form){
        applyStreamerLight(p,ang,dmg,am,pierce,wlv,form,'light');
      }else{
        // 기본 손전등 — BAL.wpn.light 참조
        const LB=BAL.wpn.light;
        const lvCnt=wlvAt(WPROJ.light,wlv);
        spawnBeam(p,ang,{
          col:'#ccffee',
          len:LB.lenBase+lvCnt*LB.lenPerLv, halfAng:LB.halfAngBase+lvCnt*LB.halfAngPerLv,
          life:LB.life, tickInt:0.22,
          dmg:dmg*LB.dmgMul, slowDur:LB.slowDur, wt:'beam'
        });
      }
      break;
    }
    case 'nightwatch':{
      const form=(p.cd.id==='sm'&&p.streamerForm)?p.streamerForm:null;
      if(form){
        applyStreamerLight(p,ang,dmg,am,pierce,wlv,form,'nightwatch');
      }else{
        // 심야경계령 진화: 더 넓고 더 자주 틱하는 초록 빔 + 짧은 광역 펄스
        const lvCnt=wlvAt(WPROJ.nightwatch,wlv);
        spawnBeam(p,ang,{
          col:'#00ff88',
          len:210+lvCnt*8, halfAng:0.55,
          life:0.65, tickInt:0.16,
          dmg:dmg*1.05, slowDur:1.8, wt:'beam_nw',
          bigClick:true
        });
        // 360° 짧은 펄스 (진화 보너스)
        aoeHit(p.x,p.y,BAL.wpn.nightwatch.pulseR,'#00ff88',dmg*BAL.wpn.nightwatch.pulseDmgMul,0.22,0,true,'flash',0);
      }
      break;
    }
    case 'staff':{
      if(p.cd.id==='gj'&&p.gjPhase==='wheelchair')break;
      const SB=BAL.wpn.staff;
      aoeHit(p.x,p.y,SB.r*am,'#cc88ff',dmg*SB.dmgMul,SB.life,pierce,false,'staff',wlvAt(WPROJ.staff,wlv));
      break;
    }
    case 'awakegj':{
      SFX.shoot();
      const cnt=wlvAt(WPROJ.awakegj,wlv);
      for(let i=0;i<cnt;i++){
        const a=ang+Math.PI*2/cnt*i;
        const pr=new Proj(p.x,p.y,Math.cos(a)*300,Math.sin(a)*300,dmg*3,1.5,'#ff88ff',18*am,pierce+2,'awakegj');
        pr.boom=true;pr.bA=a;pr.bT=0;projs.push(pr);
      }
      break;
    }
    case 'mungchi':
    case 'unleash':{
      // 컴패니언: 마릿수 고정 (mungchi=1, unleash=2), 레벨업은 데미지+스킬 빈도
      const evolved=type==='unleash';
      const wantCount=evolved?2:1;
      if(!p.companions)p.companions=[];
      p.companions.forEach(c=>c.evolved=evolved);
      while(p.companions.length<wantCount)p.companions.push(new Companion(p,evolved));
      while(p.companions.length>wantCount)p.companions.pop();
      break;
    }
    case 'gsword':{
      // 차지 액스 — BAL.wpn.gsword 참조
      const GB=BAL.wpn.gsword;
      if(p.cbMode==='sword'){
        SFX.slash();
        slashHit(p,ang,GB.swordR*am,GB.swordSpan,dmg*GB.swordDmgMul,'#ff66bb',GB.swordLife,false,true);
      }else{
        SFX.bHit();
        slashHit(p,ang,GB.axeR*am,GB.axeSpan,dmg*GB.axeDmgMul,'#ee5588',GB.axeLife,false,false);
        shake(0.12,3);
      }
      break;
    }
    case 'caff':{
      // 초고출력 차지 액스 (진화): 충전 2배, 도끼 모드시 SAED 번개 — BAL.wpn.caff 참조
      const CB=BAL.wpn.caff;
      if(p.cbMode==='sword'){
        SFX.slash();
        slashHit(p,ang,CB.swordR*am,CB.swordSpan,dmg*CB.swordDmgMul,'#ff0088',0.22,true,true);
      }else{
        // SAED: 도끼 강타 + 앞으로 번개 N발 (쾅 쾅 쾅)
        SFX.bHit();
        slashHit(p,ang,CB.axeR*am,CB.axeSpan,dmg*CB.axeDmgMul,'#ff0088',0.35,true,false);
        shake(0.15,4);
        const bdmg=dmg*CB.lightningDmgMul;
        // 번개 N발 (BAL.lightningCount), BAL.lightningDelay초 간격으로 앞으로
        for(let i=0;i<CB.lightningCount;i++){
          const dist_=70+i*55;
          const lx=p.x+Math.cos(ang)*dist_,ly=p.y+Math.sin(ang)*dist_;
          setTimeout(()=>{
            if(!player||player.hp<=0)return;
            spawnLightning(lx,ly,bdmg,true);
            SFX.thunder();
          },i*CB.lightningDelay*1000);
        }
      }
      break;
    }
  }
}
// 윤소민 스텔라이브 변신 빔 공격 (각 변신마다 빔 색/길이/각도/효과 차별화)
function applyStreamerLight(p,ang,dmg,am,pierce,wlv,form,baseType){
  const isEvo=baseType==='nightwatch';
  const lvCnt=wlvAt(WPROJ.light,wlv);
  // 진화 시 모든 변신 빔이 더 강해짐 (길이/틱속도/슬로우)
  const evoLen=isEvo?25:0, evoTick=isEvo?0.85:1.0, evoSlow=isEvo?0.4:0;
  switch(form.id){
    case 'shibuki':{
      // 여우신의 변덕: 틱마다 데미지 럭 (0.4x/1.6x/4x), 폭딜 시 화면 흔들림
      const wideBeam=isEvo;
      spawnBeam(p,ang,{
        col:form.col, // 주황
        len:(175+lvCnt*10+evoLen), halfAng:wideBeam?0.55:0.42,
        life:0.85, tickInt:0.18*evoTick,

      const beam=spawnBeam(p,ang,{

      const beams=5;

}
function aoeHit(x,y,r,col,dmg,life,pierce,slow=false,wt='',visCnt=0){
  projs.push({x,y,r,col,life,ml:life,dead:false,isAoe:true,wt,visCnt,
    update(dt){this.life-=dt;if(this.life<=0)this.dead=true},
    draw(){
      const al=this.life/this.ml,t=1-al;
      G.save();
      // 외곽 미세 링 (피해 범위 표시)
      G.globalAlpha=al*0.18;G.strokeStyle=this.col;G.lineWidth=1.5;
      G.beginPath();G.arc(this.x,this.y,this.r,0,Math.PI*2);G.stroke();
      G.globalAlpha=al*0.08;G.fillStyle=this.col;
      G.beginPath();G.arc(this.x,this.y,this.r,0,Math.PI*2);G.fill();
      G.globalAlpha=1;
      if(this.wt==='ram'||this.wt==='fullspec'){
        // 램 스틱이 방사형으로 퍼져나감 (레벨에 따라 개수↑)
        const evolved=this.wt==='fullspec';
        const cnt=this.visCnt||(evolved?10:8);
        for(let i=0;i<cnt;i++){
          const ang=Math.PI*2/cnt*i+(evolved?t*1.5:0);
          const rd=this.r*t;
          const rx=this.x+Math.cos(ang)*rd,ry=this.y+Math.sin(ang)*rd;
          const sc=evolved?0.9:0.75;
          G.save();G.globalAlpha=al*(1-t*0.4);
          G.translate(rx,ry);G.rotate(ang+Math.PI/2);
          // PCB 본체
          G.fillStyle=evolved?'#0088cc':'#1a6633';
          G.fillRect(-9*sc,-3.5*sc,18*sc,7*sc);
          G.fillStyle=evolved?'#00bbff':'#228844';
          G.fillRect(-9*sc,-3.5*sc,18*sc,1.5*sc);
          // 메모리 칩
          G.fillStyle='#1a1a1a';
          [-6,-3,0,3].forEach(ox=>G.fillRect(ox*sc,-1.8*sc,2.5*sc,2.5*sc));
          // 금 핀 (아래)
          G.fillStyle=evolved?'#ffcc00':'#ccaa00';
          G.fillRect(-8*sc,3*sc,16*sc,1.5*sc);
          // 노치
          G.fillStyle='#000';G.fillRect(-1.2*sc,3*sc,2.4*sc,1.8*sc);
          // 흰 라벨
          G.fillStyle='#fff';G.fillRect(-3*sc,-0.5*sc,4*sc,1.5*sc);
          // 발광 효과 (fullspec)
          if(evolved){
            G.strokeStyle=`rgba(0,200,255,${al*0.7})`;G.lineWidth=1;
            G.strokeRect(-9.5*sc,-4*sc,19*sc,8*sc);
          }
          G.restore();
        }
        // 중앙 임팩트 (작은 깜빡임)
        if(t<0.3){
          G.globalAlpha=al*(1-t*3)*0.6;G.fillStyle=evolved?'#88eeff':'#aaffcc';
          G.beginPath();G.arc(this.x,this.y,15+t*30,0,Math.PI*2);G.fill();
        }
      }else if(this.wt==='staff'||this.wt==='awakegj'){
        // 캐릭터 중심에서 사방으로 퍼져나가는 충격파 + 방사형 균열
        const evolved=this.wt==='awakegj';
        const baseR=this.r;
        G.translate(this.x,this.y);
        // 중앙 임팩트 플래시 (시작 순간만)
        if(t<0.2){
          G.globalAlpha=al*(1-t*5)*0.85;
          G.fillStyle='#fff';
          G.beginPath();G.arc(0,0,8+t*30,0,Math.PI*2);G.fill();
          G.globalAlpha=al*(1-t*5)*0.6;
          G.fillStyle=evolved?'#ff88ff':'#cc88ff';
          G.beginPath();G.arc(0,0,16+t*40,0,Math.PI*2);G.fill();
        }
        // 동심원 충격파 3겹 — 시간차로 퍼져나감
        for(let i=0;i<3;i++){
          const offset=i*0.18;
          const waveT=t-offset;
          if(waveT<0||waveT>1)continue;
          const r=baseR*waveT;
          // 외곽 굵은 링
          G.globalAlpha=al*(1-waveT)*0.85;
          G.strokeStyle=evolved?'#ff66ff':'#cc88ff';
          G.lineWidth=4*(1-waveT*0.5);
          G.beginPath();G.arc(0,0,r,0,Math.PI*2);G.stroke();
          // 내부 흰 코어 링
          G.globalAlpha=al*(1-waveT)*0.5;
          G.strokeStyle='#ffffff';
          G.lineWidth=1.5;
          G.beginPath();G.arc(0,0,r-3,0,Math.PI*2);G.stroke();
          // 첫 링은 연한 보라 채움
          if(i===0){
            G.globalAlpha=al*(1-waveT)*0.15;
            G.fillStyle=evolved?'#ff88ff':'#cc88ff';
            G.beginPath();G.arc(0,0,r,0,Math.PI*2);G.fill();
          }
        }
        // 방사형 균열 (사방으로 뻗어나가는 선)
        const crackCount=evolved?10:8;
        const crackT=Math.min(1,t*1.4);
        for(let j=0;j<crackCount;j++){
          const ja=j*Math.PI*2/crackCount+t*0.3;
          const r1=10, r2=10+crackT*(baseR-10);
          const wobble=Math.sin(j*7.3)*0.12;
          const ax=Math.cos(ja+wobble), ay=Math.sin(ja+wobble);
          G.globalAlpha=al*(1-crackT*0.7)*0.85;
          G.strokeStyle=evolved?'#882288':'#553377';
          G.lineWidth=2.5*(1-crackT*0.3);
          G.beginPath();
          G.moveTo(ax*r1, ay*r1);
          G.lineTo(ax*r2, ay*r2);
          G.stroke();
          // 균열 끝 작은 점 (강조)
          if(crackT>0.3){
            G.globalAlpha=al*(1-crackT)*0.75;
            G.fillStyle=evolved?'#ff88ff':'#cc88ff';
            G.beginPath();
            G.arc(ax*r2, ay*r2, 2.5+(1-crackT)*2, 0, Math.PI*2);
            G.fill();
          }
        }
        // 마지막 잔존 글로우 (페이드 아웃)
        if(t>0.6){
          const fadeT=(t-0.6)/0.4;
          G.globalAlpha=al*(1-fadeT)*0.18;
          G.fillStyle=evolved?'#ff88ff':'#cc88ff';
          G.beginPath();G.arc(0,0,baseR,0,Math.PI*2);G.fill();
        }
      }
      G.restore();
    }
  });
  (boss?[...enemies,boss]:enemies).forEach(e=>{
    if(dist({x,y},e)<r+e.sz){
      let dd=dmg;if(e===boss)dd*=player.bdm;
      const cr=Math.random()<player.crit;if(cr)dd*=2;
      e.hurt(dd,cr);if(slow&&'slow'in e)e.slow=2;
    }
  });
}

// ═══ 차지 액스 - 초승달 슬래시 + 번개 ═══
function slashHit(p,faceAng,r,spanDeg,dmg,col,life,evolved,fillGauge){
  const span=spanDeg*Math.PI/180;
  const slash={x:p.x,y:p.y,faceAng,r,span,life,ml:life,dead:false,col,evolved,isAoe:true,wt:'slash',
    update(dt){this.life-=dt;if(this.life<=0)this.dead=true;
      // 슬래시는 플레이어를 따라다님
      this.x=player.x;this.y=player.y;
    },
    draw(){
      const al=this.life/this.ml,t=1-al;
      G.save();G.translate(this.x,this.y);G.rotate(this.faceAng);
      const outer=this.r*(0.9+t*0.2),inner=outer-12;
      // 외곽 글로우
      G.globalAlpha=al*0.35;G.fillStyle=this.col;
      G.beginPath();
      G.arc(0,0,outer+5,-this.span/2,this.span/2);
      G.arc(0,0,inner-3,this.span/2,-this.span/2,true);
      G.closePath();G.fill();
      // 메인 호
      G.globalAlpha=al*0.95;G.fillStyle=this.col;
      G.beginPath();
      G.arc(0,0,outer,-this.span/2,this.span/2);
      G.arc(0,0,inner,this.span/2,-this.span/2,true);
      G.closePath();G.fill();
      // 흰 코어
      G.globalAlpha=al*0.85;G.fillStyle='#ffffff';
      G.beginPath();
      G.arc(0,0,outer-3,-this.span/2+0.08,this.span/2-0.08);
      G.arc(0,0,inner+3,this.span/2-0.08,-this.span/2+0.08,true);
      G.closePath();G.fill();
      // 끝 스파크
      G.globalAlpha=al;G.fillStyle='#ffffff';
      const tipR=(outer+inner)/2;
      [-this.span/2,this.span/2].forEach(a=>{
        G.beginPath();G.arc(Math.cos(a)*tipR,Math.sin(a)*tipR,3,0,Math.PI*2);G.fill();
      });
      G.restore();
    }
  };
  projs.push(slash);
  // 부채꼴 안에 있는 적 데미지
  const all=boss?[...enemies,boss]:enemies;
  all.forEach(e=>{
    const dx=e.x-p.x,dy=e.y-p.y,d=Math.hypot(dx,dy);
    if(d>r+e.sz||d<2)return;
    const ea=Math.atan2(dy,dx);
    let da=ea-faceAng;
    while(da>Math.PI)da-=Math.PI*2;
    while(da<-Math.PI)da+=Math.PI*2;
    if(Math.abs(da)>span/2)return;
    let dd=dmg;
    if(e===boss)dd*=p.bdm;
    const cr=Math.random()<p.crit;if(cr)dd*=2;
    e.hurt(dd,cr);
    // 검 모드일 때만 게이지 충전
    if(fillGauge&&p.cbMode==='sword'){
      const wpn=p.wpns.find(w=>w.type==='gsword'||w.type==='caff');
      if(wpn){
        const wlv=wpn.lv||1;
        const fill=(0.015+wlv*0.005)*(evolved?2:1);
        p.cbGauge=Math.min(1,p.cbGauge+fill);
        if(p.cbGauge>=1){
          // 도끼 모드 진입!
          p.cbMode='axe';
          p.cbAxeMax=evolved?6:5;
          p.cbAxeT=p.cbAxeMax;
          notify('🪓 도끼 모드!','풀 차지 완료','#ffaa44');
          SFX.phialReady();
          shake(0.15,3);
        }
      }
    }
  });
}
function spawnLightning(x,y,dmg,evolved){
  const r=evolved?42:36;
  const light={x,y,life:0.45,ml:0.45,dead:false,isAoe:true,wt:'lightning',
    update(dt){this.life-=dt;if(this.life<=0)this.dead=true},
    draw(){
      const al=this.life/this.ml,t=1-al;
      G.save();
      // 위에서 떨어지는 번개 (시각)
      G.globalAlpha=al;
      G.strokeStyle='#ffffaa';G.lineWidth=4;
      G.shadowColor='#ffff66';G.shadowBlur=12;
      G.beginPath();
      let py=this.y-220;
      G.moveTo(this.x,py);
      while(py<this.y-5){
        py+=12+Math.random()*8;
        G.lineTo(this.x+rnd(-9,9),Math.min(py,this.y-5));
      }
      G.lineTo(this.x,this.y);
      G.stroke();
      // 흰 코어
      G.shadowBlur=0;G.strokeStyle='#ffffff';G.lineWidth=1.8;
      G.beginPath();G.moveTo(this.x,this.y-220);G.lineTo(this.x,this.y);G.stroke();
      // 임팩트 폭발
      G.globalAlpha=al*0.7;G.fillStyle='#ffff77';
      G.beginPath();G.arc(this.x,this.y,r*(0.6+t*0.6),0,Math.PI*2);G.fill();
      G.globalAlpha=al*0.9;G.fillStyle='#ffffff';
      G.beginPath();G.arc(this.x,this.y,r*0.3*(1-t*0.5),0,Math.PI*2);G.fill();
      // 바닥 갈라짐 잔상
      G.globalAlpha=al*0.5;G.strokeStyle='#ffdd44';G.lineWidth=2;
      for(let i=0;i<4;i++){
        const a=Math.PI*2/4*i;
        G.beginPath();G.moveTo(this.x,this.y);
        G.lineTo(this.x+Math.cos(a)*r*(0.5+t*0.5),this.y+Math.sin(a)*r*(0.5+t*0.5));
        G.stroke();
      }
      G.restore();
    }
  };
  projs.push(light);
  // 데미지
  (boss?[...enemies,boss]:enemies).forEach(e=>{
    if(dist({x,y},e)<r+e.sz){
      let dd=dmg;
      if(e===boss)dd*=player.bdm;
      const cr=Math.random()<player.crit;if(cr)dd*=2;
      e.hurt(dd,cr);
    }
  });
  shake(0.12,3);
}
// ═══ 튕기는 RAM 스틱 (영구 — 매 발사마다 새로 생성하지 않고 1~2개를 계속 유지) ═══
// 화면 가시 영역 안에서 튕기면서 데미지. 적당 0.5초 쿨다운으로 재타격 가능.
// dead로 명시 표시할 때까지 영구. opts.persistent=true면 life 감소 안 함.
function spawnBouncingRam(p,opts){
  const o=opts||{};
  const sp=o.speed||230;
  // 초기 각도: 수직/수평에 너무 가깝지 않게 (vx, vy 모두 일정 크기 보장)
  // 사분면 1개 선택 → 그 안에서 25°~65° 사이 (대각선 영역) → 우연한 회전으로 부호 결정
  const quadrant=Math.floor(Math.random()*4);
  const angInQ=rnd(Math.PI/7, Math.PI/2-Math.PI/7);  // ~25°~65°
  const ang=quadrant*Math.PI/2+angInQ;
  const ram={
    x:p.x,y:p.y,
    vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, spdBase:sp,
    dmg:o.dmg||10,
    life:o.life||5, ml:o.life||5, dead:false,
    persistent:!!o.persistent,
    col:o.col||'#44aaff',
    sz:o.sz||10,
    wt:o.wt||'ram_bounce',
    fancy:!!o.fancy,
    trail:[],         // 잔상 추적 (최근 위치들)
    trailT:0,         // 잔상 갱신 타이머
    hitMap:new WeakMap(), // enemy -> last hit gameTime (WeakMap → 적 GC 시 자동 정리, 메모리 누수 방지)
    isAoe:true, // Proj.draw 우회 (custom draw 사용)
    update(dt){
      if(!this.persistent){
        this.life-=dt;
        if(this.life<=0){this.dead=true;return}
      }
      // 잔상 위치 기록 (0.04초마다 — 너무 자주 안 쌓이게)
      this.trailT-=dt;
      if(this.trailT<=0){
        this.trailT=0.04;
        this.trail.push({x:this.x,y:this.y});
        if(this.trail.length>8)this.trail.shift(); // 최대 8개
      }
      // 자체 이동
      this.x+=this.vx*dt;
      this.y+=this.vy*dt;
      // 화면 가시 영역 (카메라가 플레이어 따라가니까 항상 화면 안에 머무름)
      const pad=24;
      const minX=player.x-LW/2+pad, maxX=player.x+LW/2-pad;
      const minY=player.y-LH/2+pad, maxY=player.y+LH/2-pad;
      // 반사 (clamp + 부호 뒤집기)
      if(this.x<minX){this.x=minX;this.vx=Math.abs(this.vx)}
      else if(this.x>maxX){this.x=maxX;this.vx=-Math.abs(this.vx)}
      if(this.y<minY){this.y=minY;this.vy=Math.abs(this.vy)}
      else if(this.y>maxY){this.y=maxY;this.vy=-Math.abs(this.vy)}
      // 적 충돌 체크 (적당 0.5초 쿨다운)
      const cdT=0.5;
      const all=boss?[...enemies,boss]:enemies;
      all.forEach(e=>{
        const last=this.hitMap.get(e)||-1;
        if(gameTime-last<cdT)return;
        const dx=e.x-this.x,dy=e.y-this.y;
        const rr=this.sz+e.sz;
        if(dx*dx+dy*dy<rr*rr){
          let dd=this.dmg;
          if(e===boss)dd*=player.bdm;
          const cr=Math.random()<player.crit; if(cr)dd*=2;
          e.hurt(dd,cr);
          this.hitMap.set(e,gameTime);
        }
      });
    },
    draw(){
      const al=this.persistent?1:clamp(this.life/this.ml,0,1);
      const s=this.sz;
      // 뿌연 흰 트레일 (회전 없이 직사각형으로) — 가시성 안 망치는 정도
      G.save();
      this.trail.forEach((pt,i)=>{
        const f=(i+1)/this.trail.length;  // 새로울수록 진함
        G.globalAlpha=f*0.18;             // 최대 0.18 (희미)
        G.fillStyle='#ffffff';
        G.fillRect(pt.x-s,pt.y-s*0.42,s*2,s*0.84);
      });
      G.restore();
      // RAM 본체 (회전 없음, 직사각형 그대로)
      G.save();
      G.translate(this.x,this.y);
      G.globalAlpha=Math.min(1,al*1.4);
      // 글로우
      if(this.fancy){
        G.fillStyle='rgba(0,200,255,0.25)';
        G.beginPath();G.arc(0,0,s*1.6,0,Math.PI*2);G.fill();
      }
      // PCB 본체
      G.fillStyle=this.fancy?'#0088cc':'#1a6633';
      G.fillRect(-s,-s*0.42,s*2,s*0.84);
      G.fillStyle=this.fancy?'#00bbff':'#228844';
      G.fillRect(-s,-s*0.42,s*2,s*0.16);
      // 메모리 칩들
      G.fillStyle='#1a1a1a';
      for(let i=-2;i<=2;i++){
        G.fillRect(i*s*0.32-s*0.13,-s*0.22,s*0.26,s*0.44);
      }
      // 라벨 스티커
      G.fillStyle='#fff';
      G.fillRect(-s*0.32,-s*0.06,s*0.64,s*0.14);
      G.fillStyle=this.fancy?'#0088cc':'#000';
      G.fillRect(-s*0.26,-s*0.02,s*0.52,s*0.07);
      G.restore();
    }
  };
  projs.push(ram);
  return ram;
}

// ═══ 손전등 빔 (콘 단발 데미지 + 슬로우, 발사 위치에 잔상으로 남음) ═══
// 윤소민이 손전등을 "딸깍" 한 번 켜는 느낌. 빔은 발사 순간 위치/방향 고정 → 단발 데미지+슬로우 → 잔상으로 페이드.
// opts: {col,len,halfAng,life,dmg,slowDur,wt,onHit,bigClick}
function spawnBeam(p,ang,opts){
  const o=opts||{};
  // 발사 순간 위치/방향 캡처 (이후 절대 안 움직임)
  const ox=p.x, oy=p.y;
  const len=o.len||280, halfAng=o.halfAng||0.38;
  // 데미지 + 슬로우는 spawn 순간 1회만 동기 적용
  const dmg=o.dmg||10, slowDur=o.slowDur||1.4;
  const onHit=o.onHit||null;
  const all=boss?[...enemies,boss]:enemies;
  all.forEach(e=>{
    const dx=e.x-ox, dy=e.y-oy, d=Math.hypot(dx,dy);
    if(d>len+e.sz||d<2)return;
    const ea=Math.atan2(dy,dx);
    let dela=ea-ang;
    while(dela>Math.PI)dela-=Math.PI*2;
    while(dela<-Math.PI)dela+=Math.PI*2;
    if(Math.abs(dela)>halfAng)return;
    let dd=dmg;
    if(e===boss)dd*=player.bdm;
    const cr=Math.random()<player.crit; if(cr)dd*=2;
    const wasAlive=!e.dead;
    e.hurt(dd,cr);
    if('slow'in e)e.slow=Math.max(e.slow,slowDur);
    if(onHit)onHit(e,wasAlive);
  });
  // 이후 객체는 순수 시각용 — 발사 위치에 콘 잔상으로 페이드
  const beam={
    x:ox,y:oy,ang:ang,
    col:o.col||'#ccffee',
    len:len, halfAng:halfAng,
    life:o.life||0.85, ml:o.life||0.85, dead:false,
    wt:o.wt||'beam',
    click:o.bigClick?0.18:0.11, clickMax:o.bigClick?0.18:0.11,
    bigClick:!!o.bigClick, isAoe:true,
    visAlpha:o.alpha||1,  // 시각 투명도 배율 (잭팟 hina용)
    update(dt){
      this.life-=dt; if(this.life<=0){this.dead=true;return}
      if(this.click>0)this.click-=dt;
      // 위치/방향 모두 고정 — 어디에도 따라가지 않음
    },
    draw(){
      const al=clamp(this.life/this.ml,0,1);
      const clickAl=this.click>0?this.click/this.clickMax:0;
      const va=this.visAlpha;  // 시각 투명도 배율
      const cr=parseInt(this.col.slice(1,3),16),cg=parseInt(this.col.slice(3,5),16),cb=parseInt(this.col.slice(5,7),16);
      G.save();
      G.translate(this.x,this.y);
      G.rotate(this.ang);
      // 손에서 출발하는 약간의 오프셋
      const ox=4;
      const wStart=4, wEnd=Math.tan(this.halfAng)*this.len*2;
      // 외곽 글로우 콘
      G.globalAlpha=Math.min(1,(al*0.18+clickAl*0.35)*va);
      G.fillStyle=`rgb(${cr},${cg},${cb})`;
      G.beginPath();
      G.moveTo(ox,-wStart/2);
      G.lineTo(ox+this.len,-wEnd/2);
      G.lineTo(ox+this.len,wEnd/2);
      G.lineTo(ox,wStart/2);
      G.closePath();G.fill();
      // 내부 더 밝은 콘
      G.globalAlpha=Math.min(1,(al*0.42+clickAl*0.5)*va);
      G.beginPath();
      G.moveTo(ox,-wStart/4);
      G.lineTo(ox+this.len*0.95,-wEnd*0.32);
      G.lineTo(ox+this.len*0.95,wEnd*0.32);
      G.lineTo(ox,wStart/4);
      G.closePath();G.fill();
      // 중심 흰 줄기
      G.globalAlpha=(al*0.85+clickAl*0.15)*va;
      G.fillStyle='#ffffff';
      G.fillRect(ox,-1.5,this.len*0.9,3);
      // 끝 반짝
      G.globalAlpha=(al*0.7+clickAl*0.3)*va;
      G.beginPath();G.arc(ox+this.len*0.92,0,3.4+clickAl*4,0,Math.PI*2);G.fill();
      // 딸깍 플래시 (켜진 직후 origin에 흰 번쩍)
      if(clickAl>0){
        G.globalAlpha=clickAl*0.85;
        G.fillStyle='#ffffff';
        G.beginPath();G.arc(ox,0,6+clickAl*8,0,Math.PI*2);G.fill();
      }
      G.restore();
    }
  };
  projs.push(beam);
  // 딸깍 SFX + 살짝 진동
  SFX.shoot();
  if(o.bigClick)shake(0.05,1.5);
  return beam;
}

// ═══ PROJECTILE ═══
class Proj{
  constructor(x,y,vx,vy,dmg,life,col,sz,pierce,wt=''){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.pdmg=dmg;this.life=life;this.ml=life;
    this.col=col;this.sz=sz||8;this.pierce=pierce||0;
    this.dead=false;this.hs=new Set();
    this.hom=false;this.htgt=null;this.boom=false;this.bT=0;this.bA=0;
    this.wt=wt;
  }
  update(dt){
    if(this.hom&&this.htgt&&!this.htgt.dead){const a=Math.atan2(this.htgt.y-this.y,this.htgt.x-this.x),s=Math.hypot(this.vx,this.vy);this.vx+=(Math.cos(a)*s-this.vx)*dt*4;this.vy+=(Math.sin(a)*s-this.vy)*dt*4}
    if(this.boom){this.bT+=dt;if(this.bT>0.7){const a=this.bA+Math.PI,s=Math.hypot(this.vx,this.vy);this.vx+=(Math.cos(a)*s-this.vx)*dt*5;this.vy+=(Math.sin(a)*s-this.vy)*dt*5}}
    this.x+=this.vx*dt;this.y+=this.vy*dt;this.life-=dt;
    if(this.life<=0){this.dead=true;return}
    (boss?[...enemies,boss]:enemies).forEach(e=>{
      if(this.hs.has(e)||this.dead)return;
      if(dist(this,e)<this.sz+e.sz){
        let dd=this.pdmg;if(e===boss)dd*=player.bdm;
        const cr=Math.random()<player.crit;if(cr)dd*=2;
        const wasAlive=!e.dead;
        e.hurt(dd,cr);this.hs.add(e);
        // 리제 (흡혈의 밤) 효과: 처치 시 HP 회복, 적중 시 슬로우
        if(this.wt==='light_lz'){
          if('slow'in e)e.slow=1.5;
          if(wasAlive&&e.dead&&Math.random()<0.5){
            const heal=3;
            player.hp=Math.min(player.mhp,player.hp+heal);
            showDmg(player.x,player.y-16,heal,'#ff66aa',false);
          }
        }
        if(this.pierce<=0)this.dead=true;else this.pierce--;
      }
    });
  }
  draw(){
    G.save();
    const al=clamp(this.life/this.ml,0,1),s=this.sz;
    G.globalAlpha=al;
    const ang=Math.atan2(this.vy,this.vx);
    const spinT=(this.ml-this.life)*10;
    G.translate(this.x,this.y);
    switch(this.wt){
      case 'knife':case 'fullcourse':{
        G.rotate(ang);
        const fancy=this.wt==='fullcourse';
        // 트레일 (fullcourse만 불꽃)
        if(fancy){
          G.fillStyle=`rgba(255,140,40,${al*0.5})`;
          G.beginPath();G.moveTo(-s*1.8,-s*0.45);G.lineTo(-s*3.2,0);G.lineTo(-s*1.8,s*0.45);G.closePath();G.fill();
          G.fillStyle=`rgba(255,220,80,${al*0.7})`;
          G.beginPath();G.moveTo(-s*1.8,-s*0.18);G.lineTo(-s*2.5,0);G.lineTo(-s*1.8,s*0.18);G.closePath();G.fill();
        }
        // 칼날 (커다란 삼각형)
        G.fillStyle=fancy?'#ffcc66':'#dddddd';
        G.beginPath();G.moveTo(s*2.1,0);G.lineTo(-s*0.4,-s*0.38);G.lineTo(-s*0.4,s*0.38);G.closePath();G.fill();
        // 칼날 하이라이트 (위쪽 빛)
        G.fillStyle='#ffffff';
        G.beginPath();G.moveTo(s*1.9,0);G.lineTo(-s*0.3,-s*0.14);G.lineTo(-s*0.3,-s*0.02);G.closePath();G.fill();
        // 칼날 그림자 (아래쪽 어두움)
        G.fillStyle=fancy?'#cc5500':'#888888';
        G.beginPath();G.moveTo(s*1.9,0);G.lineTo(-s*0.3,s*0.02);G.lineTo(-s*0.3,s*0.32);G.closePath();G.fill();
        // 십자 가드
        G.fillStyle='#1a1a1a';G.fillRect(-s*0.6,-s*0.55,s*0.25,s*1.1);
        G.fillStyle='#444';G.fillRect(-s*0.6,-s*0.55,s*0.25,s*0.2);
        // 손잡이
        G.fillStyle=fancy?'#aa3300':'#5a3a18';G.fillRect(-s*1.7,-s*0.4,s*1.1,s*0.8);
        G.fillStyle=fancy?'#771100':'#2a1a08';G.fillRect(-s*1.7,s*0.05,s*1.1,s*0.35);
        G.fillStyle=fancy?'#cc5500':'#7a5028';G.fillRect(-s*1.7,-s*0.4,s*1.1,s*0.15);
        // 리벳 2개
        G.fillStyle='#aaa';
        G.fillRect(-s*1.3,-s*0.1,s*0.18,s*0.18);
        G.fillRect(-s*0.85,-s*0.1,s*0.18,s*0.18);
        G.fillStyle='#222';
        G.fillRect(-s*1.27,-s*0.07,s*0.1,s*0.1);
        G.fillRect(-s*0.82,-s*0.07,s*0.1,s*0.1);
        // 폼멜
        G.fillStyle=fancy?'#882200':'#3a2010';
        G.fillRect(-s*1.85,-s*0.32,s*0.18,s*0.64);
        break;
      }
      case 'light_tb':{
        // 트로트 변신 호밍 음표 (♪) - 빛나는 트레일 + 음표 머리
        const cr=parseInt(this.col.slice(1,3),16),cg=parseInt(this.col.slice(3,5),16),cb=parseInt(this.col.slice(5,7),16);
        // 빛나는 글로우
        G.globalAlpha=al*0.35;
        G.fillStyle=`rgb(${cr},${cg},${cb})`;
        G.beginPath();G.arc(0,0,s*0.95,0,Math.PI*2);G.fill();
        G.globalAlpha=al*0.7;
        G.beginPath();G.arc(0,0,s*0.55,0,Math.PI*2);G.fill();
        // 음표 머리 (검은 타원, 살짝 기울임)
        G.globalAlpha=al;
        G.rotate(-0.35+spinT*0.3);
        G.fillStyle='#1a0a00';
        G.beginPath();G.ellipse(0,0,s*0.4,s*0.28,0,0,Math.PI*2);G.fill();
        // 음표 줄기 (스템)
        G.fillStyle='#1a0a00';
        G.fillRect(s*0.35,-s*0.9,s*0.1,s*0.95);
        // 깃발 (flag)
        G.fillStyle=`rgb(${cr},${cg},${cb})`;
        G.beginPath();
        G.moveTo(s*0.45,-s*0.9);
        G.quadraticCurveTo(s*1.1,-s*0.6,s*0.7,-s*0.15);
        G.quadraticCurveTo(s*0.55,-s*0.5,s*0.45,-s*0.45);
        G.closePath();G.fill();
        // 반짝

        G.fillStyle='#ffffff';
        G.beginPath();G.arc(-s*0.18,-s*0.1,s*0.08,0,Math.PI*2);G.fill();

      case 'gsword_axe':case 'caff_axe':{

        G.rotate(ang+spinT*1.5);
        const fancy=this.wt==='caff_axe';
        // 발광 효과 (개방의 검)
        if(fancy){
          G.fillStyle=`rgba(255,80,180,${al*0.4})`;

          G.fillStyle=`rgba(255,255,255,${al*0.3})`;
          G.beginPath();G.arc(0,0,s*0.9,0,Math.PI*2);G.fill();
        }
        // 손잡이 (가로 막대)
        G.fillStyle='#5a3a18';
        G.fillRect(-s*1.8,-s*0.16,s*3.6,s*0.32);
        G.fillStyle='#7a4a28';G.fillRect(-s*1.8,-s*0.16,s*3.6,s*0.08);
        G.fillStyle='#3a2010';G.fillRect(-s*1.8,s*0.08,s*3.6,s*0.08);
        // 손잡이 줄 감기
        G.fillStyle='#222';
        G.fillRect(-s*1.2,-s*0.16,s*0.06,s*0.32);
        G.fillRect(-s*0.6,-s*0.16,s*0.06,s*0.32);
        G.fillRect(s*0.2,-s*0.16,s*0.06,s*0.32);
        // 도끼 머리 (오른쪽 큰 반달 칼날)
        G.fillStyle=fancy?'#660033':'#444444';
        // 도끼 머리 백킹
        G.beginPath();
        G.moveTo(s*1.5,-s*0.7);G.lineTo(s*2.4,-s*0.4);
        G.lineTo(s*2.5,s*0.0);G.lineTo(s*2.4,s*0.4);

        // 도끼 칼날 (밝은 가장자리)

        G.lineTo(s*1.6,s*0.65);G.lineTo(s*1.5,s*0.3);
        G.lineTo(s*1.5,-s*0.3);G.closePath();G.fill();
        // 칼날 하이라이트
        G.fillStyle='#ffffff';
        G.beginPath();
        G.moveTo(s*1.6,-s*0.55);G.lineTo(s*2.1,-s*0.3);
        G.lineTo(s*2.0,-s*0.1);G.lineTo(s*1.5,-s*0.2);G.closePath();G.fill();
        // 도끼 머리 가운데 보석/장식

        G.beginPath();G.arc(s*1.85,0,s*0.18,0,Math.PI*2);G.fill();

        G.lineTo(0,0);G.closePath();G.fill();
        break;
      }
      case 'gsword':case 'caff':{
        G.rotate(ang+spinT);
        const fancy=this.wt==='caff';
        // 전기 효과 (caff)
        if(fancy){

        G.fillRect(-s*1.0,s*0.1,s*0.55,s*0.07);
        // 폼멜
        G.fillStyle=fancy?'#ffcc00':'#aa8833';
        G.beginPath();G.arc(-s*1.15,0,s*0.22,0,Math.PI*2);G.fill();
        G.fillStyle=fancy?'#ffee66':'#ccaa55';
        G.beginPath();G.arc(-s*1.2,-s*0.08,s*0.1,0,Math.PI*2);G.fill();
        break;
      }
      case 'mungchi':case 'unleash':{
        G.rotate(ang);
        const fancy=this.wt==='unleash';
        const t=Math.floor(spinT*1.5)%2,bob=t?-0.5:0;  // 달리는 애니메이션
        // 그림자
        G.fillStyle='rgba(0,0,0,0.35)';
        G.beginPath();G.ellipse(0,s*0.5,s*0.55,s*0.15,0,0,Math.PI*2);G.fill();
        // 다리 (앞 + 뒤, 번갈아 움직임)
        const lcol=fancy?'#aa6600':'#7a4a18';
        G.fillStyle=lcol;
        G.fillRect(-s*0.4,s*0.15+(t?0.1:0)*s,s*0.18,s*0.3);
        G.fillRect(-s*0.15,s*0.15+(t?0:0.1)*s,s*0.18,s*0.3);
        G.fillRect(s*0.1,s*0.15+(t?0.1:0)*s,s*0.18,s*0.3);
        G.fillRect(s*0.3,s*0.15+(t?0:0.1)*s,s*0.18,s*0.3);
        // 몸통
        G.fillStyle=fancy?'#ffaa44':'#cc8844';
        G.fillRect(-s*0.55,-s*0.2+bob*s*0.1,s*0.95,s*0.4);
        // 몸통 하이라이트 (위)
        G.fillStyle=fancy?'#ffcc77':'#dd9955';
        G.fillRect(-s*0.55,-s*0.2+bob*s*0.1,s*0.95,s*0.1);
        // 몸통 어두운 (배)
        G.fillStyle=fancy?'#cc7722':'#9a5a20';
        G.fillRect(-s*0.55,s*0.1+bob*s*0.1,s*0.95,s*0.1);
        // 머리 (앞쪽)
        G.fillStyle=fancy?'#ffaa44':'#cc8844';
        G.fillRect(s*0.3,-s*0.3+bob*s*0.1,s*0.45,s*0.4);
        // 머리 하이라이트
        G.fillStyle=fancy?'#ffcc77':'#dd9955';
        G.fillRect(s*0.3,-s*0.3+bob*s*0.1,s*0.45,s*0.1);
        // 귀 (위)
        G.fillStyle=fancy?'#cc7722':'#7a4a18';
        G.fillRect(s*0.3,-s*0.45+bob*s*0.1,s*0.13,s*0.2);
        // 주둥이
        G.fillStyle=fancy?'#ffcc77':'#dd9955';
        G.fillRect(s*0.65,-s*0.05+bob*s*0.1,s*0.15,s*0.15);
        // 꼬리 (뒤)
        G.fillStyle=fancy?'#ffaa44':'#cc8844';
        G.fillRect(-s*0.75,-s*0.1+(t?-0.05:0.05)*s,s*0.25,s*0.1);
        // 눈
        G.fillStyle='#000';G.fillRect(s*0.52,-s*0.2+bob*s*0.1,s*0.09,s*0.09);
        G.fillStyle='#fff';G.fillRect(s*0.54,-s*0.19+bob*s*0.1,s*0.03,s*0.03);
        // 코
        G.fillStyle='#000';G.fillRect(s*0.72,-s*0.0+bob*s*0.1,s*0.1,s*0.1);
        // 입
        G.fillStyle='#660000';G.fillRect(s*0.55,s*0.12+bob*s*0.1,s*0.18,s*0.04);
        // 발광 (unleash 진화형)
        if(fancy){
          G.strokeStyle=`rgba(255,200,0,${al*0.6})`;G.lineWidth=2;
          G.beginPath();G.ellipse(0,0,s*0.9,s*0.5,0,0,Math.PI*2);G.stroke();
          G.fillStyle=`rgba(255,200,0,${al*0.25})`;
          G.beginPath();G.ellipse(0,0,s*0.7,s*0.4,0,0,Math.PI*2);G.fill();
        }
        break;
      }
      case 'awakegj':{
        // 보라 마법 지팡이 (회전)
        G.rotate(spinT);
        // 오라
        G.fillStyle=`rgba(255,180,255,${al*0.35})`;
        G.beginPath();G.arc(0,-s*0.7,s*0.85,0,Math.PI*2);G.fill();
        // 지팡이 샤프트
        G.fillStyle='#5a3a18';G.fillRect(-s*0.15,-s*0.6,s*0.3,s*1.6);
        G.fillStyle='#7a4a28';G.fillRect(-s*0.15,-s*0.6,s*0.1,s*1.6);
        G.fillStyle='#3a2010';G.fillRect(s*0.05,-s*0.6,s*0.1,s*1.6);
        // 갈고리 손잡이 (위)
        G.fillStyle='#5a3a18';
        G.fillRect(-s*0.45,-s*0.75,s*0.6,s*0.15);
        G.fillRect(-s*0.45,-s*0.75,s*0.15,s*0.35);
        // 위 오브 (보라 발광)
        G.fillStyle='#ff88ff';
        G.beginPath();G.arc(0,-s*0.85,s*0.42,0,Math.PI*2);G.fill();
        // 오브 하이라이트
        G.fillStyle='#ffccff';
        G.beginPath();G.arc(-s*0.12,-s*0.95,s*0.17,0,Math.PI*2);G.fill();
        // 오브 코어
        G.fillStyle='#ffffff';
        G.beginPath();G.arc(-s*0.14,-s*0.98,s*0.07,0,Math.PI*2);G.fill();
        // 폼멜 (아래 끝)
        G.fillStyle='#aa8833';
        G.beginPath();G.arc(0,s*1.0,s*0.18,0,Math.PI*2);G.fill();
        break;
      }
      default:{
        // RAM 스틱 (램 기본/풀스펙)
        G.rotate(ang);
        const evolved=this.wt==='fullspec';
        // 풀스펙 글로우
        if(evolved){G.save();G.shadowColor='#00eeff';G.shadowBlur=10}
        // PCB
        G.fillStyle=evolved?'#0a4a7a':'#1a6633';G.fillRect(-s*0.9,-s*0.35,s*1.8,s*0.7);
        // PCB 하이라이트
        G.fillStyle=evolved?'#2288cc':'#228844';G.fillRect(-s*0.9,-s*0.35,s*1.8,s*0.1);
        // PCB 그림자
        G.fillStyle=evolved?'#052238':'#0a3318';G.fillRect(-s*0.9,s*0.22,s*1.8,s*0.13);
        // 메모리 칩 (검은 사각형들)
        G.fillStyle='#1a1a1a';
        [-0.7,-0.4,-0.1,0.2,0.5].forEach(ox=>{G.fillRect(s*ox,-s*0.18,s*0.22,s*0.25)});
        // 칩 핀 다리
        G.fillStyle='#666';
        [-0.7,-0.4,-0.1,0.2,0.5].forEach(ox=>{
          G.fillRect(s*ox,-s*0.22,s*0.22,s*0.04);
          G.fillRect(s*ox,s*0.07,s*0.22,s*0.03);
        });
        // 금 접점 핀 (아래)
        G.fillStyle=evolved?'#ffcc00':'#ddaa00';G.fillRect(-s*0.85,s*0.32,s*1.7,s*0.1);
        // 핀 줄무늬
        G.fillStyle=evolved?'#aa8800':'#8a6a00';
        for(let i=0;i<10;i++)G.fillRect(-s*0.8+i*s*0.17,s*0.32,s*0.05,s*0.1);
        // 노치 (가운데 홈)
        G.fillStyle='#000';G.fillRect(-s*0.12,s*0.3,s*0.24,s*0.14);
        // 라벨/스티커
        G.fillStyle='#fff';G.fillRect(-s*0.3,-s*0.05,s*0.6,s*0.13);
        G.fillStyle=evolved?'#0088cc':'#000';G.fillRect(-s*0.25,-s*0.02,s*0.5,s*0.07);
        if(evolved)G.restore();
      }
    }
    G.restore();
  }
}

// ═══ ENEMY ═══
class Enemy{
  constructor(x,y,type,elite=false){
    this.x=x;this.y=y;this.type=type;this.dead=false;
    this.flash=0;this.slow=0;this.ct=0;this.elite=elite;
    this.kvx=0;this.kvy=0;
    const w=Math.floor(gameTime/30),hs=1+gameTime*0.015,em=elite?2.2:1;
    if(type==='zombie'){
      this.hp=this.mhp=(35+w*8)*hs*em;this.spd=(38+w*1.5)*(elite?1.2:1);
      this.dmg=(10+w)*em;this.col='#44bb44';this.sz=12*(elite?1.3:1);this.xv=3*(elite?3:1);
    }else if(type==='bat'){
      this.hp=this.mhp=(18+w*4)*hs*em;this.spd=90+w*3;
      this.dmg=(6+w*0.5)*em;this.col='#9955aa';this.sz=8*(elite?1.3:1);this.xv=2*(elite?3:1);
      this.zT=0;this.zD=1;
    }else if(type==='rusher'){
      this.hp=this.mhp=(22+w*5)*hs*em;this.spd=(100+w*2)*(elite?1.15:1);
      this.dmg=(8+w*0.8)*em;this.col='#dd4488';this.sz=9*(elite?1.3:1);this.xv=2*(elite?3:1);
    }else if(type==='tank'){
      this.hp=this.mhp=(180+w*30)*hs*em;this.spd=(28+w*1)*(elite?1.1:1);
      this.dmg=(22+w*2)*em;this.col='#7a4a8a';this.sz=18*(elite?1.3:1);this.xv=12*(elite?3:1);
    }else{ // skeleton
      this.hp=this.mhp=(60+w*12)*hs*em;this.spd=(50+w*2)*(elite?1.1:1);
      this.dmg=(15+w*1.5)*em;this.col='#cccccc';this.sz=14*(elite?1.3:1);this.xv=6*(elite?3:1);
      this.sT=rnd(2,4);
    }
    if(elite)SFX.elite();
  }
  update(dt){
    if(this.flash>0)this.flash-=dt;
    if(this.slow>0)this.slow-=dt;
    if(this.ct>0)this.ct-=dt;
    const sm=this.slow>0?0.4:1;
    let dx=player.x-this.x,dy=player.y-this.y;
    const d=Math.hypot(dx,dy)||1;
    if(this.type==='bat'){
      this.zT-=dt;if(this.zT<=0){this.zD*=-1;this.zT=rnd(0.3,0.7)}
      const px=-dy/d,py=dx/d;dx+=px*this.zD*60;dy+=py*this.zD*60;
    }
    const len=Math.hypot(dx,dy)||1;
    this.x+=dx/len*this.spd*sm*dt;this.y+=dy/len*this.spd*sm*dt;
    // 넉백 적용
    if(this.kvx||this.kvy){this.x+=this.kvx*dt;this.y+=this.kvy*dt;this.kvx*=0.82;this.kvy*=0.82;if(Math.abs(this.kvx)<2)this.kvx=0;if(Math.abs(this.kvy)<2)this.kvy=0}
    if(this.type==='skeleton'&&this.sT!==undefined){
      this.sT-=dt;
      if(this.sT<=0&&d<360){
        const a=Math.atan2(player.y-this.y,player.x-this.x);
        const pb={x:this.x,y:this.y,vx:Math.cos(a)*185,vy:Math.sin(a)*185,pdmg:this.dmg*0.6,life:2.5,sz:7,col:'#aaaaff',dead:false,
          update(dt2){this.x+=this.vx*dt2;this.y+=this.vy*dt2;this.life-=dt2;if(this.life<=0){this.dead=true;return}if(dist(this,player)<this.sz+12){player.takeDmg(this.pdmg);this.dead=true}},
          draw(){G.fillStyle=this.col;G.fillRect(this.x-this.sz/2,this.y-this.sz/2,this.sz,this.sz)}
        };
        projs.push(pb);this.sT=rnd(2.5,4.5);
      }
    }
    if(d<this.sz+13&&this.ct<=0){player.takeDmg(this.dmg);this.ct=0.8}
  }
  hurt(v,crit){
    const dmg=v*(this.elite?0.7:1);
    this.hp-=dmg;this.flash=0.12;
    spawnParts(this.x,this.y,this.col,this.elite?5:3);SFX.hit();
    const col=crit?'#ffee44':(this.elite?'#aaff66':'#ffeecc');
    showDmg(this.x,this.y-this.sz,dmg,col,this.elite||crit,crit);
    spark(this.x,this.y,crit?'#ffdd44':this.col,crit?6:(this.elite?5:3));
    // 넉백 (플레이어 반대방향, 탱커는 약하게)
    const kbStr=this.type==='tank'?40:(crit?160:90);
    const ang=Math.atan2(this.y-player.y,this.x-player.x);
    this.kvx+=Math.cos(ang)*kbStr;this.kvy+=Math.sin(ang)*kbStr;
    if(this.hp<=0)this.die();
  }
  die(){
    this.dead=true;killCount++;bumpCombo();
    gems.push(new Gem(this.x,this.y,this.xv));
    spawnParts(this.x,this.y,this.col,this.elite?14:7);
    // 잔해/핏자국 데칼 제거 — 가시성 확보 (파티클만 잠깐 보이고 사라짐)
    if(this.elite){shake(0.15,3);if(Math.random()<0.15)spawnPickup(this.x,this.y);}
  }
  draw(){
    const h=this.flash>0;
    G.save();G.translate(this.x,this.y);G.scale(0.72,0.72);G.translate(-this.x,-this.y);
    if(this.type==='zombie')sZombie(this.x,this.y,afr,h,this.elite);
    else if(this.type==='bat')sBat(this.x,this.y,afr,h,this.elite);
    else if(this.type==='rusher')sRusher(this.x,this.y,afr,h,this.elite);
    else if(this.type==='tank')sTank(this.x,this.y,afr,h,this.elite);
    else sSkel(this.x,this.y,afr,h,this.elite);
    G.restore();
    if(this.hp<this.mhp){
      const s=this.sz;
      G.fillStyle='#500';G.fillRect(this.x-s/2,this.y-s/2-12,s,3);
      G.fillStyle=this.elite?'#aaff44':'#00ff44';G.fillRect(this.x-s/2,this.y-s/2-12,s*(this.hp/this.mhp),3);
    }
  }
}

// ═══ BOSS ═══
const BDEFS=[
  {t:180,bt:'sabi',name:'🐕 싸비',bHp:1800,bS:95,bD:30,col:'#888888',sz:36,bXp:60},
  {t:360,bt:'truck',name:'🖥️ 납품트럭',bHp:2500,bS:55,bD:30,col:'#4488cc',sz:44,bXp:120},
  {t:600,bt:'uncomfy',name:'😤 불편러',bHp:5000,bS:70,bD:35,col:'#ff8888',sz:36,bXp:200},
  {t:900,bt:'lol',name:'😡 협곡의 망령',bHp:8000,bS:95,bD:48,col:'#ff3333',sz:36,bXp:300},
];
class Boss{
  constructor(def){
    this.name=def.name;this.bt=def.bt;this.col=def.col;this.sz=def.sz;
    this.hp=def.bHp;this.mhp=def.bHp;this.spd=def.bS;this.cdmg=def.bD;this.bxp=def.bXp;
    const a=Math.random()*Math.PI*2;this.x=player.x+Math.cos(a)*520;this.y=player.y+Math.sin(a)*520;
    this.phase=1;this.dead=false;this.flash=0;this.at=0;
    this.bp=[];this.slow=0;this.pf=0;this.ann=3;this.ct=0;this.pat=0;
    this.tele=[];  // 텔레그래프 경고
    SFX.boss();
  }
  addTele(x,y,r,life){this.tele.push({x,y,r,life,ml:life,dead:false})}
  bp_add(a,spd,dmg,col,sz){this.bp.push({x:this.x,y:this.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,pdmg:dmg,life:3.5,sz:sz||10,col:col||this.col,dead:false})}
  update(dt){
    if(this.flash>0)this.flash-=dt;if(this.ann>0)this.ann-=dt;if(this.pf>0)this.pf-=dt;if(this.ct>0)this.ct-=dt;if(this.slow>0)this.slow-=dt;
    if(this.hp<this.mhp*0.5&&this.phase===1){this.phase=2;this.spd*=1.6;this.cdmg*=1.4;this.pf=2}
    const sm=this.slow>0?0.4:1,dx=player.x-this.x,dy=player.y-this.y,d=Math.hypot(dx,dy)||1;
    this.x+=dx/d*this.spd*sm*dt;this.y+=dy/d*this.spd*sm*dt;
    if(d<this.sz+13&&this.ct<=0){player.takeDmg(this.cdmg);this.ct=0.6}
    this.at-=dt;
    if(this.at<=0){this.attack();this.at=this.phase===2?(this.bt==='sabi'?0.8:1.0):(this.bt==='sabi'?1.6:2.2);this.pat=(this.pat+1)%3}
    this.bp=this.bp.filter(p=>!p.dead);
    this.bp.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0){p.dead=true;return}if(dist(p,player)<p.sz+12){player.takeDmg(p.pdmg);p.dead=true}});
    // 텔레그래프 시간 감소
    this.tele.forEach(t=>{t.life-=dt;if(t.life<=0)t.dead=true});
    this.tele=this.tele.filter(t=>!t.dead);
  }
  attack(){
    const cnt=this.phase===2?8:4,a=Math.atan2(player.y-this.y,player.x-this.x);
    if(this.bt==='sabi'){
      // pat0: 360° 링 (페이즈2 시 8발), pat1: 5방향 부채꼴 강력 탄, pat2: 텔레그래프 후 플레이어 위치 폭발
      const ring=this.phase===2?8:6;
      const spread=this.phase===2?7:5;
      if(this.pat===0){
        for(let i=0;i<ring;i++)this.bp_add(Math.PI*2/ring*i+gameTime,170,this.cdmg*0.55,'#888888',12);
      }else if(this.pat===1){
        for(let i=0;i<spread;i++){
          const da=-0.5+1.0*(i/(spread-1));
          this.bp_add(a+da,220,this.cdmg*0.75,'#cccccc',10);
        }
      }else{
        // 물어뜯기: 플레이어 위치 텔레그래프 후 8방향 폭발 탄
        const tx=player.x,ty=player.y;
        this.addTele(tx,ty,50,0.6);
        const self=this;
        setTimeout(()=>{
          if(!self.dead&&boss){
            for(let i=0;i<8;i++){
              const ba=Math.PI*2/8*i;
              self.bp.push({
                x:tx,y:ty,
                vx:Math.cos(ba)*200,vy:Math.sin(ba)*200,
                pdmg:self.cdmg*0.85,life:1.0,sz:12,
                col:'#aaaaaa',dead:false
              });
            }
            SFX.bHit();
          }
        },600);
      }
    }else if(this.bt==='truck'){
      if(this.pat===0)for(let i=0;i<cnt;i++)this.bp_add(Math.PI*2/cnt*i,130,this.cdmg*0.5,'#4488cc',16);
      else if(this.pat===1)for(let i=-2;i<=2;i++)this.bp_add(a+i*0.25,200,this.cdmg*0.5,'#88ccff',12);
      else{
        // 텔레그래프 후 슬램
        const positions=[];
        for(let i=0;i<4;i++){const ra=Math.random()*Math.PI*2;positions.push({x:player.x+Math.cos(ra)*90,y:player.y+Math.sin(ra)*90})}
        positions.forEach(pos=>this.addTele(pos.x,pos.y,30,0.5));
        const self=this;
        setTimeout(()=>{if(!self.dead)positions.forEach(pos=>self.bp.push({x:pos.x,y:pos.y,vx:0,vy:0,pdmg:self.cdmg*0.9,life:0.8,sz:20,col:'#4488cc',dead:false}))},500);
      }
    }else if(this.bt==='uncomfy'){
      if(this.pat===0)for(let i=0;i<cnt;i++)this.bp_add(Math.PI*2/cnt*i+gameTime*0.5,120,this.cdmg*0.4,'#ff8888',14);
      else if(this.pat===1)for(let i=0;i<5;i++)setTimeout(()=>{if(boss)this.bp_add(a+rnd(-0.3,0.3),185,this.cdmg*0.7,'#ff5555',12)},i*120);
      else for(let i=0;i<12;i++)this.bp_add(Math.PI*2/12*i+gameTime,100,this.cdmg*0.35,'#ff8888',10);
    }else{
      if(this.pat===0)for(let i=0;i<cnt;i++)this.bp_add(Math.PI*2/cnt*i+gameTime,170,this.cdmg*0.5,'#ff3333',12);
      else if(this.pat===1)for(let i=0;i<(this.phase===2?6:3);i++)this.bp_add(a+rnd(-0.5,0.5),200+rnd(-30,30),this.cdmg*0.6,'#ff5500',14);
      else{
        // 텔레그래프 후 체인 발사
        const self=this;
        [0,0.3,-0.3].forEach(da=>{
          const tx=self.x+Math.cos(a+da)*200,ty=self.y+Math.sin(a+da)*200;
          self.addTele(tx,ty,40,0.4);
        });
        [0,220,440].forEach(delay=>setTimeout(()=>{if(boss&&!self.dead)[0,0.3,-0.3].forEach(da=>self.bp_add(a+da,220,self.cdmg*0.8,'#ff3333',16))},delay+400));
      }
    }
  }
  hurt(v,crit){this.hp-=v;this.flash=0.08;SFX.bHit();spawnParts(this.x,this.y,this.col,4);showDmg(this.x+rnd(-12,12),this.y-this.sz/2-4,v,crit?'#ffee22':'#ffaa44',true,crit);if(this.hp<=0)this.die()}
  die(){

    });

    if(this.flash>0){G.globalAlpha=0.6;G.fillStyle='#fff';G.fillRect(this.x-this.sz/2,this.y-this.sz/2,this.sz,this.sz);G.globalAlpha=1}
    if(this.phase===2){G.strokeStyle='#ff0000';G.lineWidth=3;G.shadowColor='#ff0000';G.shadowBlur=10;G.strokeRect(this.x-this.sz/2-3,this.y-this.sz/2-3,this.sz+6,this.sz+6);G.shadowBlur=0;G.lineWidth=1}
    G.fillStyle='#000';G.font='bold 11px Courier New';

  // 화면 좌표계에서 그려지는 등장 연출 (render에서 호출됨)
  drawAnn(){
    if(this.ann<=0)return;
