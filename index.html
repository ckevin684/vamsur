// ═══ GEM & PARTICLES ═══
class Gem{
  constructor(x,y,v){this.x=x;this.y=y;this.v=v;this.dead=false;this.t=Math.random()*Math.PI*2;
    // 색상 등급
    if(v<=3){this.col='#00ccff';this.col2='rgba(0,180,255,0.25)';this.sz=4}
    else if(v<=7){this.col='#ffdd44';this.col2='rgba(255,200,0,0.3)';this.sz=5}
    else if(v<=15){this.col='#ff66ff';this.col2='rgba(220,80,220,0.35)';this.sz=6}
    else{this.col='#ff4444';this.col2='rgba(255,40,40,0.4)';this.sz=7}
  }
  update(dt){
    this.t+=dt*4;const d=dist(this,player);
    const magR=player.magrBoost>0?99999:player.magr;
    if(d<magR){const a=Math.atan2(player.y-this.y,player.x-this.x),s=Math.max(player.magrBoost>0?500:200,(magR-d)*5);this.x+=Math.cos(a)*s*dt;this.y+=Math.sin(a)*s*dt}
    if(dist(this,player)<14){player.gainXp(this.v);this.dead=true;SFX.gem()}
  }
  draw(){
    const s=this.sz+Math.sin(this.t)*1.2;
    G.save();
    // 외광
    G.fillStyle=this.col2;G.fillRect(this.x-s,this.y-s,s*2,s*2);
    // 본체 (다이아몬드)
    G.fillStyle=this.col;G.beginPath();
    G.moveTo(this.x,this.y-s);G.lineTo(this.x+s*0.7,this.y);G.lineTo(this.x,this.y+s);G.lineTo(this.x-s*0.7,this.y);
    G.closePath();G.fill();
    // 하이라이트
    G.fillStyle='rgba(255,255,255,0.7)';G.beginPath();
    G.moveTo(this.x,this.y-s*0.5);G.lineTo(this.x+s*0.25,this.y-s*0.1);G.lineTo(this.x-s*0.15,this.y-s*0.1);
    G.closePath();G.fill();
    G.restore();
  }
}
function spawnParts(x,y,col,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=rnd(30,130);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.3,0.7),ml:0.7,col,dead:false})}}

// ═══ COMPANION (뭉치 - 흰 코카 스파니엘) ═══
class Companion{
  constructor(p,evolved){
    this.x=p.x+rnd(-30,30);this.y=p.y+rnd(-30,30);
    this.target=null;this.biteT=0;this.fr=0;this.evolved=!!evolved;
    this.facing={x:1,y:0};
    this.lookT=0;
    this.barkT=rnd(4,6);    // 짖기 쿨다운 (Lv3+에서 활성화, 진화 시 Lv2+)
    this.scratchCount=0;     // 할퀴기 연속 카운터
    this.scratchT=0;
    this.barkAnimT=0;        // 짖기 시각 효과 타이머
    this.scratchAnimT=0;     // 할퀴기 시각 효과 타이머
    this.returnT=rnd(8,10);  // 플레이어 복귀 타이머 (8~10초마다 강제 복귀, 사냥 끊김 적게)
    this.returning=false;    // 현재 복귀 중인지
  }
  getWpnLv(){
    const w=player.wpns.find(w=>w.type==='mungchi'||w.type==='unleash');
    return w?(w.lv||1):1;
  }
  baseDmg(){
    const lv=this.getWpnLv();
    const dM=wlvAt(WLV.dmgM,lv);
    return 24*player.dm*dM*(1+Math.max(0,player.lv-1)*0.04)*(this.evolved?1.2:1);  // 진화 1.4→1.2 너프
  }
  doBark(){
    const lv=this.getWpnLv();
    const r=90+lv*8+(this.evolved?30:0);
    const dmg=this.baseDmg()*1.4;
    let hits=0;
    (boss?[...enemies,boss]:enemies).forEach(e=>{
      if(dist(this,e)<r+e.sz){
        let dd=dmg;if(e===boss)dd*=player.bdm;
        const cr=Math.random()<player.crit;if(cr)dd*=2;
        e.hurt(dd,cr);
        // 약한 넉백
        const a=Math.atan2(e.y-this.y,e.x-this.x);
        e.kvx+=Math.cos(a)*70;e.kvy+=Math.sin(a)*70;
        hits++;
      }
    });
    this.barkAnimT=0.7;  // 더 오래 보이게
    this.barkR=r;
    playBark();  // 실제 뭉치 짖음 (영상에서 추출)
  }
  doScratch(){
    const lv=this.getWpnLv();
    if(lv<2||!this.target||this.target.dead)return false;
    const scratchChance=this.evolved?0.85:(0.25+lv*0.08);
    if(Math.random()>scratchChance)return false;
    this.scratchCount=this.evolved?4:3;
    this.scratchT=0.12;
    this.scratchAnimT=0.45;  // 더 오래 보이게
    SFX.slash();
    return true;
  }
  update(dt){
    this.fr+=dt*7;
    if(this.biteT>0)this.biteT-=dt;
    if(this.barkAnimT>0)this.barkAnimT-=dt;
    if(this.scratchAnimT>0)this.scratchAnimT-=dt;
    this.lookT-=dt;
    this.returnT-=dt;
    const lv=this.getWpnLv();
    // 짖기 (Lv 3+) - 복귀 중에도 발동, 진화 시 Lv 2+로 더 일찍
    const barkMinLv=this.evolved?2:3;
    if(lv>=barkMinLv){
      this.barkT-=dt;
      if(this.barkT<=0){
        this.doBark();
        this.barkT=Math.max(1.5,5.5-lv*0.5)-(this.evolved?1:0);
      }
    }
    // 5~6초마다 플레이어 복귀 강제
    if(this.returnT<=0&&!this.returning){
      this.returning=true;
      this.target=null;
    }
    if(this.returning){
      const pd=dist(this,player);
      if(pd<60){
        // 복귀 완료, 다시 사냥
        this.returning=false;
        this.returnT=rnd(8,10);
      }else{
        // 플레이어한테 직진 (적 무시)
        const dx=player.x-this.x,dy=player.y-this.y,d=Math.hypot(dx,dy)||1;
        this.facing={x:dx/d,y:dy/d};
        const spd=this.evolved?320:280;  // 복귀 속도는 빠르게
        this.x+=dx/d*spd*dt;this.y+=dy/d*spd*dt;
        return;  // 사냥 로직 스킵
      }
    }
    // 타겟 탐색
    if(!this.target||this.target.dead||this.lookT<=0){
      this.lookT=0.4;
      let best=null,bestD=380;
      const all=boss?[...enemies,boss]:enemies;
      all.forEach(e=>{const d=dist(this,e);if(d<bestD){bestD=d;best=e}});
      this.target=best;
    }
    let mvSpd=170;
    if(this.target&&!this.target.dead){
      const dx=this.target.x-this.x,dy=this.target.y-this.y;
      const d=Math.hypot(dx,dy)||1;
      this.facing={x:dx/d,y:dy/d};
      if(d<this.target.sz+13){
        if(this.biteT<=0){
          let dmg=this.baseDmg();
          if(this.target===boss)dmg*=player.bdm;
          const cr=Math.random()<player.crit;if(cr)dmg*=2;
          this.target.hurt(dmg,cr);
          this.doScratch();
          this.biteT=Math.max(0.3,0.55-lv*0.025);
          this.x-=dx/d*5;this.y-=dy/d*5;
        }else if(this.scratchCount>0){
          this.scratchT-=dt;
          if(this.scratchT<=0&&!this.target.dead){
            let dmg=this.baseDmg()*0.5;
            if(this.target===boss)dmg*=player.bdm;
            const cr=Math.random()<player.crit;if(cr)dmg*=2;
            this.target.hurt(dmg,cr);
            this.scratchCount--;
            this.scratchT=0.12;
            this.scratchAnimT=0.35;  // 추가타 잔상
          }
        }
      }else{
        mvSpd=this.evolved?260:220;
        this.x+=dx/d*mvSpd*dt;this.y+=dy/d*mvSpd*dt;
      }
    }else{
      const pd=dist(this,player);
      if(pd>80){
        const dx=player.x-this.x,dy=player.y-this.y,d=Math.hypot(dx,dy);
        this.facing={x:dx/d,y:dy/d};
        this.x+=dx/d*180*dt;this.y+=dy/d*180*dt;
      }else if(pd<40){
        const a=Math.atan2(this.y-player.y,this.x-player.x);
        this.x+=Math.cos(a)*60*dt;this.y+=Math.sin(a)*60*dt;
      }
    }
    if(dist(this,player)>500){this.x=player.x+rnd(-60,60);this.y=player.y+rnd(-60,60);this.target=null}
  }
  draw(){
    // 짖기 시각 효과 (확장하는 노란 링 + "멍!" 큰 글씨)
    if(this.barkAnimT>0){
      const t=1-this.barkAnimT/0.7;  // 0.7s 지속
      const baseR=this.barkR||80;
      G.save();
      // 외곽 충격파 링 (가장 큰, 가장 두꺼움)
      G.shadowColor='#ffdd44';G.shadowBlur=18;
      G.globalAlpha=(1-t)*0.85;
      G.strokeStyle='#ffdd44';G.lineWidth=6;
      G.beginPath();G.arc(this.x,this.y,baseR*t,0,Math.PI*2);G.stroke();
      // 중간 링
      G.shadowBlur=10;
      G.globalAlpha=(1-t)*0.65;
      G.strokeStyle='#ffaa22';G.lineWidth=4;
      G.beginPath();G.arc(this.x,this.y,baseR*t*0.85,0,Math.PI*2);G.stroke();
      // 안쪽 흰 코어
      G.shadowBlur=0;
      G.globalAlpha=(1-t)*0.75;
      G.strokeStyle='#ffffff';G.lineWidth=2;
      G.beginPath();G.arc(this.x,this.y,baseR*t*0.65,0,Math.PI*2);G.stroke();
      // 충격파 채움 (반투명)
      G.globalAlpha=(1-t)*0.15;
      G.fillStyle='#ffee88';
      G.beginPath();G.arc(this.x,this.y,baseR*t,0,Math.PI*2);G.fill();
      // "멍!" 큰 글씨 (오래 보임)
      if(t<0.6){
        const fade=1-t/0.6;
        G.globalAlpha=fade;
        const sz=20+t*14;  // 점점 커짐
        const ty=this.y-22-t*18;
        G.font=`bold ${sz}px Courier New`;G.textAlign='center';
        // 검은 외곽
        G.strokeStyle='#000';G.lineWidth=3;
        G.strokeText('멍!',this.x,ty);
        // 노란 본체
        G.fillStyle='#ffdd44';G.fillText('멍!',this.x,ty);
      }
      G.restore();
    }
    drawCocker(this.x,this.y,this.fr,this.evolved,this.facing.x<0);
    // 할퀴기 시각 효과 (5개 굵은 발톱 자국)
    if(this.scratchAnimT>0&&this.target&&!this.target.dead){
      const ml=0.45,t=1-this.scratchAnimT/ml;
      G.save();
      const tx=this.target.x,ty=this.target.y,off=this.target.sz+3;
      const baseAng=Math.atan2(ty-this.y,tx-this.x);
      const slashCol=this.evolved?'#ffdd44':'#ff5566';
      // 외곽 글로우
      G.shadowColor=slashCol;G.shadowBlur=12;
      G.globalAlpha=(1-t)*0.9;
      G.strokeStyle=slashCol;G.lineWidth=5;
      [-0.55,-0.25,0,0.25,0.55].forEach(da=>{
        const a=baseAng+da;
        const startR=off-6+t*4;
        const endR=off+16-t*2;
        G.beginPath();
        G.moveTo(tx-Math.cos(a)*startR,ty-Math.sin(a)*startR);
        G.lineTo(tx+Math.cos(a)*endR,ty+Math.sin(a)*endR);
        G.stroke();
      });
      // 흰 코어 (날카로움)
      G.shadowBlur=0;
      G.globalAlpha=(1-t)*1.0;
      G.strokeStyle='#ffffff';G.lineWidth=1.8;
      [-0.55,-0.25,0,0.25,0.55].forEach(da=>{
        const a=baseAng+da;
        G.beginPath();
        G.moveTo(tx-Math.cos(a)*(off-4),ty-Math.sin(a)*(off-4));
        G.lineTo(tx+Math.cos(a)*(off+14),ty+Math.sin(a)*(off+14));
        G.stroke();
      });
      // "할퀴!" 텍스트
      if(t<0.5){
        const fade=1-t/0.5;
        G.globalAlpha=fade*0.95;
        G.font='bold 12px Courier New';G.textAlign='center';
        G.strokeStyle='#000';G.lineWidth=2.5;
        G.strokeText('할퀴!',tx,ty-this.target.sz-8-t*8);
        G.fillStyle=slashCol;G.fillText('할퀴!',tx,ty-this.target.sz-8-t*8);
      }
      G.restore();
    }
    // 복귀 중일 때 머리 위 작은 인디케이터
    if(this.returning){
      G.save();
      G.globalAlpha=Math.sin(gameTime*8)*0.4+0.6;
      G.font='10px Courier New';G.textAlign='center';
      G.fillStyle='#000';G.fillText('🏃',this.x,this.y-22);
      G.restore();
    }
  }
}
// 페이얼 게이지: 화면 좌하단 고정 위치 (콤보 카운터 위) — 머리 위 UI 혼잡 회피
// 신경주사 화살표 (휠체어 모드, 신경주사가 화면 밖에 있으면 화면 가장자리에 방향 표시)
function drawNerveInjectionArrow(){
  if(!player||player.cd.id!=='gj'||player.gjPhase!=='wheelchair')return;
  const inj=player.gjInjectionRef;
  if(!inj||inj.dead)return;
  // 플레이어 기준 상대 위치
  const dx=inj.x-player.x, dy=inj.y-player.y;
  const d=Math.hypot(dx,dy);
  const visW=LW/2-30, visH=LH/2-30;
  // 화면 안에 있으면 화살표 표시 안 함 (그냥 픽업 보임)
  if(Math.abs(dx)<visW&&Math.abs(dy)<visH)return;
  // 화면 가장자리 위치 계산
  const a=Math.atan2(dy,dx);
  const cosA=Math.cos(a),sinA=Math.sin(a);
  // 직사각형 가장자리 클리핑
  const tX=visW/Math.abs(cosA),tY=visH/Math.abs(sinA);
  const t=Math.min(tX,tY);
  const ex=cosA*t, ey=sinA*t;
  const sx=LW/2+ex, sy=LH/2+ey;
  G.save();

function drawRouletteAnim(){

  // 결과 인덱스 및 스크롤 계산
  // ease-out quartic — 끝에서 거의 멈춤 (prog=1에서 미분=0)
  const targetIdx=STREAMER_FORMS.indexOf(player.rouletteResult);
  const cycleH=STREAMER_FORMS.length*36;
  // N번 완전 회전 + 마지막에 targetIdx에 안착
  const N=6;
  const totalDist=N*cycleH+targetIdx*36;
  // ease-out: 1 - (1-prog)^4 → 초반 빠르고 끝에서 거의 안 움직임
  const eased=1-Math.pow(1-prog,4);
  const scrollY=totalDist*eased;
  // 폼들 표시 (위/중간/아래) — textBaseline='middle' 사용해서 정확한 시각 중앙 정렬
  const slotCenter=slotY+slotH/2;
  G.save();
  G.beginPath();G.rect(bx+20,slotY,bw-40,slotH);G.clip();
  G.textBaseline='middle';
  for(let i=-1;i<=3;i++){
    const idx=((Math.floor(scrollY/36)+i)%STREAMER_FORMS.length+STREAMER_FORMS.length)%STREAMER_FORMS.length;
    const form=STREAMER_FORMS[idx];
    const fy=slotCenter-(scrollY%36)+i*36;
    const distFromCenter=Math.abs(fy-slotCenter);

    G.globalAlpha=isCenter?1:Math.max(0.25,0.7-distFromCenter*0.015);
    G.fillStyle=form.col;G.font=`bold ${isCenter?22:15}px Courier New`;
    G.textAlign='center';
    G.fillText(form.emoji+' '+form.name,LW/2,fy);
  }
  G.textBaseline='alphabetic';
  G.restore();
  // 선택 인디케이터 (중앙) — 슬롯 정중앙에 박스, 끝나갈수록 노란빛 강해짐
  const glow=prog>0.7?(prog-0.7)/0.3:0;
  const boxH=32, boxY=slotCenter-boxH/2;
  G.strokeStyle=`rgba(255,${255-glow*60},${102-glow*102},${1})`;
  G.lineWidth=2+glow*2;
  G.strokeRect(bx+20,boxY,bw-40,boxH);

  G.fillRect(bx+18,boxY+boxH/2-8,4,16);G.fillRect(bx+bw-22,boxY+boxH/2-8,4,16);

  G.fillStyle='#ffaa44';G.fillRect(bx+12,by+bh-12,(bw-24)*prog,4);

  G.fillStyle='#fff';G.fillRect(x+7,y-4,1,1);G.fillRect(x+12,y-4,1,1);
  // 코 — 작은 검은 단추 (사진 기반, 가운데 살짝 위)
  G.fillStyle=blk;G.fillRect(x+13,y-1,2,2);
  // 입 (살짝 벌린 표정 — 사진처럼 잠잠한 느낌)
  G.fillStyle='#3a1a1a';G.fillRect(x+12,y+1,2,1);
  // 작은 혀 (가끔)
  if(t===0){G.fillStyle='#ff8899';G.fillRect(x+13,y+2,1,1)}
  // 진화형 (unleash) — 황금 글로우
  if(evolved){
    G.save();
    G.shadowColor='#ffaa00';G.shadowBlur=8;
    G.strokeStyle='rgba(255,200,0,0.55)';G.lineWidth=1;
    G.strokeRect(x-9,y-8,18,18);

    G.fillStyle='#ffcc00';G.fillRect(x+4,y,9,1);
    G.fillStyle='#ffee88';G.fillRect(x+8,y,2,1);
  }
  G.restore();
}

// ═══ LEVEL UP ═══
function triggerLvUp(){
  state='levelup';SFX.lvUp();
  const evoPool=[],wpnPool=[],itmPool=[];

  // ✨ 진화: 무기 maxLv + 페어 아이템 maxLv
  player.wpns.forEach(w=>{
    if(WDEFS[w.type].evolved)return; // 이미 진화
    const ev=EVOS[w.type];if(!ev)return;
    if((w.lv||1)<W_MAX_LV)return; // 무기 미완성
    if(player.pLv(ev.need)<P_MAX_LV)return; // 페어 아이템 미완성
    evoPool.push({
      tag:'✨진화',
      name:`✨ ${WDEFS[ev.res].name}`,
      desc:`${WDEFS[w.type].name} → ${WDEFS[ev.res].name}`,
      fn:()=>{w.type=ev.res;w.lv=1;SFX.evolve();notify('✨ 진화 완료!',WDEFS[ev.res].name,'#ffdd44')}
    });
  });

  // 무기 업그레이드 (현재 보유, max 미만)
  player.wpns.forEach(w=>{
    if((w.lv||1)>=W_MAX_LV)return;
    if(WDEFS[w.type].evolved)return; // 진화무기는 더 안 오름
    const wd=WDEFS[w.type],next=(w.lv||1)+1;
    wpnPool.push({
      tag:'무기 ⬆',
      name:`${wd.name}`,
      desc:`Lv.${w.lv||1} → Lv.${next}${next===W_MAX_LV?' (MAX)':''}`,
      lvBadge:`Lv.${next}`,
      fn:()=>{w.lv=next;if(next===W_MAX_LV)notify('⚔ 무기 MAX',wd.name+' 진화 준비','#ff8844')}
    });
  });

  // 새 무기 (슬롯 여유)
  if(player.wpns.length<W_SLOTS){
    const owned=player.wpns.map(w=>w.type);
    // 진화된 무기 보유 시 그 베이스 무기도 제외 (다시 못 먹게)
    const evolvedOwned=new Set();
    Object.entries(EVOS).forEach(([base,def])=>{
      if(owned.includes(def.res))evolvedOwned.add(base);
    });
    // 최초는 컴패니언 전문가 — 다른 베이스 무기 못 들음 (mungchi만 사용)
    const isCho=player.cd.id==='co';
    BASE_WPNS.filter(t=>{
      if(owned.includes(t))return false;
      if(evolvedOwned.has(t))return false;
      if(isCho&&t!=='mungchi')return false;
      return true;
    }).forEach(wt=>{
      wpnPool.push({
        tag:'무기 NEW',
        name:`${WDEFS[wt].name}`,
        desc:'새 무기 슬롯',
        lvBadge:'NEW',
        fn:()=>player.wpns.push({type:wt,t:0,lv:1})
      });
    });
  }

  // 아이템 업그레이드 (보유 중, max 미만)
  Object.keys(player.passives).forEach(id=>{
    const lv=player.passives[id];if(lv>=P_MAX_LV)return;
    const ps=PASSIVES.find(x=>x.id===id);if(!ps)return;
    const next=lv+1;
    itmPool.push({
      tag:'아이템 ⬆',
      name:ps.name,
      desc:`${ps.desc} (Lv.${lv} → Lv.${next}${next===P_MAX_LV?' MAX':''})`,
      lvBadge:`Lv.${next}`,
      fn:()=>{player.passives[id]=next;ps.fn(player);if(next===P_MAX_LV)notify('🎁 아이템 MAX',ps.name,'#88ccff')}
    });
  });

  // 새 아이템 (슬롯 여유)
  if(player.pCnt()<P_SLOTS){
    PASSIVES.filter(p=>!player.hasP(p.id)).forEach(p=>{
      itmPool.push({
        tag:'아이템 NEW',
        name:p.name,
        desc:p.desc,
        lvBadge:'NEW',
        fn:()=>{player.passives[p.id]=1;p.fn(player)}
      });
    });
  }

  // 3개 선택: 진화 1개 우선, 나머지는 무기/아이템 섞어서
  upgradeChoices=[];
  if(evoPool.length)upgradeChoices.push(evoPool[0]);
  // 무기/아이템 풀에서 랜덤 픽 (없으면 다른 풀에서)
  const pickFrom=arr=>{if(!arr.length)return null;const i=Math.floor(Math.random()*arr.length);return arr.splice(i,1)[0]};
  while(upgradeChoices.length<3){
    // 균형: 무기와 아이템 번갈아
    const wantWpn=upgradeChoices.filter(c=>c.tag.startsWith('무기')).length<=upgradeChoices.filter(c=>c.tag.startsWith('아이템')).length;
    let next=wantWpn?pickFrom(wpnPool)||pickFrom(itmPool):pickFrom(itmPool)||pickFrom(wpnPool);
    if(!next)break;
    upgradeChoices.push(next);
  }
  // 풀이 완전히 비면 회복으로 폴백
  if(!upgradeChoices.length){
    upgradeChoices.push({tag:'보너스',name:'💚 회복',desc:'HP 50% 회복',lvBadge:'',fn:()=>{player.hp=Math.min(player.mhp,player.hp+player.mhp*0.5)}});
  }
}

// ═══ WORLD ═══
const TILES=[],GRASS=[],FOGS=[];
function initWorld(){
  TILES.length=0;
  for(let i=0;i<320;i++){
    const r=Math.random();
    const t=r<0.25?'grave':r<0.45?'tree':r<0.55?'crucifix':r<0.70?'rock':r<0.85?'bush':'bone';
    TILES.push({x:rnd(-1900,1900),y:rnd(-1900,1900),t,seed:Math.random()});
  }
  GRASS.length=0;
  for(let i=0;i<600;i++)GRASS.push({x:rnd(-1900,1900),y:rnd(-1900,1900),s:rnd(2,4),c:Math.random()<0.5?'#1d3a1d':'#244a24'});
  FOGS.length=0;
  for(let i=0;i<14;i++)FOGS.push({x:rnd(-1900,1900),y:rnd(-1900,1900),r:rnd(180,320),sp:rnd(8,18),ph:Math.random()*Math.PI*2});
}
function drawWorld(){
  // 바닥 그라데이션 base
  G.fillStyle='#0a120a';G.fillRect(-4000,-4000,8000,8000);
  // 바닥 텍스처 (얼룩)
  G.save();

  for(let gx=Math.floor((player.x-LW/2)/80)*80;gx<player.x+LW/2;gx+=80){
    for(let gy=Math.floor((player.y-LH/2)/80)*80;gy<player.y+LH/2;gy+=80){
      const h=Math.sin(gx*0.013+gy*0.017)*0.5+0.5;
      if(h<0.4){G.globalAlpha=0.5;G.fillRect(gx,gy,80,80)}
    }
  }
  G.restore();
  // 그리드 (희미하게)
  G.strokeStyle='#0d130d';G.lineWidth=0.5;
  const sx=Math.floor((player.x-LW/2)/48)*48,ex=player.x+LW/2;
  const sy=Math.floor((player.y-LH/2)/48)*48,ey=player.y+LH/2;
  for(let gx=sx;gx<=ex;gx+=48){G.beginPath();G.moveTo(gx,sy);G.lineTo(gx,ey);G.stroke()}
  for(let gy=sy;gy<=ey;gy+=48){G.beginPath();G.moveTo(sx,gy);G.lineTo(ex,gy);G.stroke()}
  // 잔디 (작은 점들)
  GRASS.forEach(g=>{
    if(Math.abs(g.x-player.x)>LW/2+20||Math.abs(g.y-player.y)>LH/2+20)return;
    G.fillStyle=g.c;G.fillRect(g.x,g.y,g.s,g.s);

  });

  G.strokeRect(-1900,-1900,3800,3800);G.setLineDash([]);

  // 타일/오브젝트
  TILES.forEach(t=>{
    if(Math.abs(t.x-player.x)>LW/2+30||Math.abs(t.y-player.y)>LH/2+30)return;
    const tx=t.x,ty=t.y;

      G.fillRect(tx-10,ty-24,20,5);
      G.fillStyle='#244a24';G.fillRect(tx-12,ty-20,24,3);G.fillRect(tx-12,ty-20,3,16);
      G.fillStyle='#0e1f0e';G.fillRect(tx-12,ty-7,24,3);G.fillRect(tx+9,ty-20,3,16);
      // 잎 텍스처
      G.fillStyle='#152815';G.fillRect(tx-6,ty-15,3,3);G.fillRect(tx+3,ty-12,3,3);
    }else if(t.t==='grave'){
      shadow(tx,ty+10,10,3,0.5);
      // 무덤 흙
      G.fillStyle='#3a2510';G.fillRect(tx-9,ty-1,18,10);

      G.fillStyle='#6a6a6a';G.fillRect(tx-8,ty-15,3,15);G.fillRect(tx-8,ty-15,16,1);
      // R.I.P 글자
      G.fillStyle='#222';G.fillRect(tx-5,ty-10,2,3);G.fillRect(tx-1,ty-10,2,3);G.fillRect(tx+3,ty-10,2,3);
      // 십자가 표시
      G.fillStyle='#222';G.fillRect(tx-1,ty-7,2,5);G.fillRect(tx-3,ty-5,6,2);
    }else if(t.t==='crucifix'){

// ═══ HUD ═══
function drawBar(x,y,w,h,pct,bgC1,bgC2,c1,c2,c3,label,labCol){
  // 배경 (입체감)
  G.fillStyle=bgC1;G.fillRect(x,y,w,h);
  G.fillStyle=bgC2;G.fillRect(x,y+h-2,w,2);
  // 채워진 부분 (그라데이션)
  const fw=Math.max(0,w*pct);
  const gr=G.createLinearGradient(x,y,x,y+h);
  gr.addColorStop(0,c1);gr.addColorStop(0.5,c2);gr.addColorStop(1,c3);
  G.fillStyle=gr;G.fillRect(x,y,fw,h);
  // 하이라이트
  G.fillStyle='rgba(255,255,255,0.3)';G.fillRect(x,y+1,fw,1);
  // 테두리
  G.strokeStyle='rgba(0,0,0,0.8)';G.lineWidth=1;G.strokeRect(x+0.5,y+0.5,w,h);
  G.strokeStyle='rgba(255,255,255,0.15)';G.strokeRect(x-0.5,y-0.5,w+1,h+1);
  if(label){
    G.font='bold 10px Courier New';G.textAlign='center';
    G.fillStyle='#000';G.fillText(label,x+w/2+1,y+h-3+1);
    G.fillStyle=labCol||'#fff';G.fillText(label,x+w/2,y+h-3);
  }
}

  }else if(p.cd.id==='jw'){
    // 주문 폭주: 활성 시 잔여 시간 / 대기 중 콤보 카운트
    const active=p.rushT>0;
    G.fillStyle='rgba(0,0,0,0.6)';G.fillRect(mX,mY-9,mW,10);
    if(active){
      G.fillStyle='#ff8844';G.fillRect(mX,mY-9,mW*(p.rushT/5),10);
      G.fillStyle='#000';G.font='bold 8px Courier New';G.textAlign='center';
      G.fillText(`🍳 ${p.rushT.toFixed(1)}s`,mX+mW/2,mY-1);
    }else{
      const frac=Math.min(1,p.rushKills/12);
      G.fillStyle='#552';G.fillRect(mX,mY-9,mW*frac,10);
      G.fillStyle='#ffaa66';G.font='bold 8px Courier New';G.textAlign='center';
      G.fillText(`🍳 ${p.rushKills}/12`,mX+mW/2,mY-1);
    }
  }else if(p.cd.id==='gj'){
    // 기종 phase별 표시
    G.fillStyle='rgba(0,0,0,0.6)';G.fillRect(mX,mY-9,mW,10);
    if(p.gjPhase==='rage'){
      // 분노 카운트다운 바
      const t=Math.max(0,p.gjPhaseT/6);
      G.fillStyle='#ff3366';G.fillRect(mX,mY-9,mW*t,10);
      G.fillStyle='#fff';G.font='bold 8px Courier New';G.textAlign='center';
      G.fillText(`🔥 ${p.gjPhaseT.toFixed(1)}s`,mX+mW/2,mY-1);
    }else if(p.gjPhase==='wheelchair'){
      // 휠체어 모드 — 신경주사 찾기 안내
      const bl=Math.sin(gameTime*4)*0.5+0.5;
      G.fillStyle=`rgba(136,170,255,${0.6+bl*0.4})`;G.fillRect(mX,mY-9,mW,10);
      G.fillStyle='#001';G.font='bold 8px Courier New';G.textAlign='center';
      G.fillText('🦽 💉 찾기',mX+mW/2,mY-1);
    }else{
      // 정상 — 누적 게이지
      const c=p.discPain>=0.85?'#ff66cc':'#9966cc';
      G.fillStyle=c;G.fillRect(mX,mY-9,mW*p.discPain,10);
      G.fillStyle='#fff';G.font='bold 8px Courier New';G.textAlign='center';
      G.fillText(`💥 ${Math.round(p.discPain*100)}%`,mX+mW/2,mY-1);
    }
  }
  // 윤소민 변신 인디케이터 (현재 변신 + 다음 룰렛까지 카운트다운)
  if(p.cd.id==='sm'){
    const sIX=260,sIY=10,sIW=140,sIH=30;  // 높이 24→30 (한글 위 잘림 방지)
    G.fillStyle='rgba(0,0,0,0.7)';G.fillRect(sIX,sIY,sIW,sIH);
    const form=p.streamerForm,col=form?form.col:'#888';
    G.strokeStyle=col;G.lineWidth=1.5;G.strokeRect(sIX,sIY,sIW,sIH);
    G.fillStyle=col;G.font='bold 11px Courier New';G.textAlign='left';
    if(form){
      G.fillText(form.emoji+' '+form.name,sIX+6,sIY+18);
    }else{
      G.fillStyle='#888';
      G.fillText('🎤 윤소민 (평소)',sIX+6,sIY+18);
    }
    // 다음 룰렛까지 카운트다운 바
    G.fillStyle='#222';G.fillRect(sIX,sIY+sIH,sIW,3);
    const t=(p.rouletteT>0||p.awaitingClick)?1:(p.streamerT/30);
    const barCol=p.awaitingClick?'#ffff66':(p.rouletteT>0?'#ffaa44':col);
    G.fillStyle=barCol;G.fillRect(sIX,sIY+sIH,sIW*t,3);
    // 시간 텍스트 (서브)
    G.fillStyle='#aaa';G.font='8px Courier New';G.textAlign='right';
    if(p.awaitingClick)G.fillText('👆 클릭하여 변신',sIX+sIW-4,sIY+27);
    else if(p.rouletteT>0)G.fillText('🎰 룰렛 돌아가는 중',sIX+sIW-4,sIY+27);
    else G.fillText(`다음 변신 ${Math.ceil(p.streamerT)}s`,sIX+sIW-4,sIY+27);
  }
  G.restore();
  // 중앙 - 시계
  G.save();
  const mm=String(Math.floor(gameTime/60)).padStart(2,'0'),ss=String(Math.floor(gameTime%60)).padStart(2,'0');
  G.fillStyle='rgba(0,0,0,0.7)';G.fillRect(LW/2-46,8,92,42);
  G.strokeStyle='#555';G.lineWidth=1;G.strokeRect(LW/2-46,8,92,42);
  G.fillStyle='#222';G.fillRect(LW/2-44,10,88,2);
  G.fillStyle='#fff';G.font='bold 22px Courier New';G.textAlign='center';
  G.fillStyle='#222';G.fillText(`${mm}:${ss}`,LW/2+1,33);
  G.fillStyle='#ffdd88';G.fillText(`${mm}:${ss}`,LW/2,32);
  G.fillStyle='#888';G.font='bold 9px Courier New';G.fillText(`💀 ${killCount}`,LW/2,45);
  G.restore();
  // 우측 - 무기 슬롯 (4칸 고정 그리드, 한글 잘림 방지 위해 패널 확장)
  G.save();
  const wsX=LW-148,wsY=8,wsH=22+W_SLOTS*16;
  G.fillStyle='rgba(20,20,30,0.85)';G.fillRect(wsX,wsY,140,wsH);
  G.strokeStyle='#444';G.lineWidth=1;G.strokeRect(wsX,wsY,140,wsH);
  G.fillStyle='#ff8866';G.font='bold 9px Courier New';G.textAlign='left';G.fillText(`⚔ 무기 ${p.wpns.length}/${W_SLOTS}`,wsX+6,wsY+14);
  for(let i=0;i<W_SLOTS;i++){
    const w=p.wpns[i],wy=wsY+27+i*16;
    G.fillStyle='rgba(0,0,0,0.5)';G.fillRect(wsX+4,wy-10,132,15);
    if(!w){G.fillStyle='#222';G.fillRect(wsX+4,wy-10,132,15);G.fillStyle='#444';G.font='9px Courier New';G.fillText('빈 슬롯',wsX+8,wy);continue}
    const wd=WDEFS[w.type];if(!wd)continue;
    G.fillStyle=wd.col+'33';G.fillRect(wsX+4,wy-10,132,15);
    // 쿨다운 진행도
    const maxCd=wd.cd*wlvAt(WLV.cdM,w.lv)/p.as,cdP=Math.max(0,Math.min(1,1-w.t/maxCd));
    G.fillStyle=wd.col;G.fillRect(wsX+4,wy+4,132*cdP,2);
    // 이름
    const maxed=wd.evolved||w.lv>=W_MAX_LV;
    G.fillStyle=wd.evolved?'#ffdd44':(maxed?'#ffaa44':'#eee');G.font='bold 9px Courier New';
    G.fillText(wd.name.slice(0,12),wsX+8,wy);
    // 레벨
    G.fillStyle=maxed?'#ffdd44':'#aaa';G.font='bold 8px Courier New';G.textAlign='right';
    G.fillText(wd.evolved?'★EVO':(w.lv>=W_MAX_LV?'MAX':`L${w.lv}`),wsX+134,wy);
    G.textAlign='left';
  }
  // 아이템 슬롯
  const isX=wsX,isY=wsY+wsH+6,isH=22+P_SLOTS*16,pIds=Object.keys(p.passives);
  G.fillStyle='rgba(20,20,30,0.85)';G.fillRect(isX,isY,140,isH);
  G.strokeStyle='#444';G.lineWidth=1;G.strokeRect(isX,isY,140,isH);
  G.fillStyle='#88ccff';G.font='bold 9px Courier New';G.textAlign='left';G.fillText(`🎁 아이템 ${pIds.length}/${P_SLOTS}`,isX+6,isY+14);
  for(let i=0;i<P_SLOTS;i++){
    const id=pIds[i],iy=isY+27+i*16;
    G.fillStyle='rgba(0,0,0,0.5)';G.fillRect(isX+4,iy-10,132,15);
    if(!id){G.fillStyle='#222';G.fillRect(isX+4,iy-10,132,15);G.fillStyle='#444';G.font='9px Courier New';G.fillText('빈 슬롯',isX+8,iy);continue}
    const ps=PASSIVES.find(x=>x.id===id),lv=p.passives[id];
    if(!ps)continue;
    const maxed=lv>=P_MAX_LV;
    G.fillStyle=(maxed?'#88ccff33':'#88ccff15');G.fillRect(isX+4,iy-10,132,15);
    G.fillStyle=maxed?'#88ddff':'#ccc';G.font='bold 9px Courier New';
    G.fillText(ps.name.slice(0,12),isX+8,iy);
    G.fillStyle=maxed?'#88ddff':'#aaa';G.font='bold 8px Courier New';G.textAlign='right';
    G.fillText(maxed?'MAX':`L${lv}`,isX+134,iy);
    G.textAlign='left';
  }
  G.restore();
  // 보스 체력바
  if(boss){
    const bw=400,bx=LW/2-bw/2,by=LH-46;
    // 배경 패널
    G.save();
    G.fillStyle='rgba(0,0,0,0.85)';G.fillRect(bx-8,by-28,bw+16,52);
    G.strokeStyle=boss.phase===2?'#ff2222':'#aa3333';G.lineWidth=2;
    G.strokeRect(bx-8,by-28,bw+16,52);
    // 이름
    G.fillStyle='#000';G.font='bold 14px Courier New';G.textAlign='center';
    G.fillText(boss.name+(boss.phase===2?' ⚠ 2페이즈':''),LW/2+1,by-9);
    G.fillStyle=boss.phase===2?'#ff5555':'#ffaa66';
    G.fillText(boss.name+(boss.phase===2?' ⚠ 2페이즈':''),LW/2,by-10);
    // 보스 HP바
    drawBar(bx,by,bw,18,boss.hp/boss.mhp,
      '#1a0000','#0a0000',
      boss.phase===2?'#ff6644':'#ff8866',
      boss.phase===2?'#dd1111':'#cc3333',
      boss.phase===2?'#880000':'#661111',
      `${Math.ceil(boss.hp)} / ${boss.mhp}`,'#fff');
    G.restore();
  }
  // 페이즈2 빨간 깜빡임
  if(boss&&boss.phase===2){G.fillStyle=`rgba(180,0,0,${Math.sin(gameTime*5)*0.04+0.06})`;G.fillRect(0,0,LW,LH)}
}

function getTitleBtnAt(mx,my){
  for(let i=0;i<TITLE_BTNS.length;i++){

function drawVolSlider(x,y,w,val,col,id){
  // 트랙
  G.fillStyle='#0a0a14';G.fillRect(x,y,w,8);
  G.strokeStyle='#3a3a4a';G.lineWidth=1;G.strokeRect(x,y,w,8);
  // 채워진 부분
  const fw=w*val;
  const gr=G.createLinearGradient(x,y,x,y+8);
  gr.addColorStop(0,col);gr.addColorStop(1,shade(col,-40));
  G.fillStyle=gr;G.fillRect(x,y,fw,8);
  // 핸들 (knob)

    let type='zombie';
    if(gameTime>=60)type=rv<0.55?'zombie':'bat';
    if(gameTime>=120)type=rv<0.4?'zombie':rv<0.6?'bat':rv<0.85?'rusher':'zombie';
    if(gameTime>=200)type=rv<0.3?'zombie':rv<0.5?'bat':rv<0.7?'rusher':rv<0.88?'skeleton':'zombie';
    if(gameTime>=300){
      // 탱커 가끔 추가
      if(rv<0.25)type='zombie';
      else if(rv<0.45)type='bat';
      else if(rv<0.6)type='rusher';
      else if(rv<0.78)type='skeleton';
      else if(rv<0.88)type='tank';
      else type='zombie';
    }
    const elite=Math.random()<0.08;
    enemies.push(new Enemy(ex,ey,type,elite));
  }
  spawnT=Math.max(0.4,2.2-wave*0.15);
}

// ═══ MAIN ═══
function startGame(cd){
  player=new Player(cd);enemies=[];projs=[];gems=[];parts=[];boss=null;
  gameTime=0;spawnT=0;bossIdx=0;bossActive=false;killCount=0;afr=0;afrT=0;
  dmgTexts=[];hitSparks=[];notifs=[];pickups=[];decals=[];lvUpBursts=[];
  shakeT=0;shakeM=0;combo=0;comboT=0;comboMax=0;paused=false;pendingLvUps=0;
  weatherT=0;flashT=0;camOX=0;camOY=0;
  initWorld();state='playing';
  notify('▶  GAME START','WASD/방향키 · SPACE 대시 · P 일시정지','#ffaa66');
  playBgm('battle');
}
function reset(){
  state='title';player=null;enemies=[];projs=[];gems=[];parts=[];boss=null;bossActive=false;
  dmgTexts=[];hitSparks=[];notifs=[];pickups=[];decals=[];lvUpBursts=[];
  shakeT=0;shakeM=0;combo=0;comboT=0;paused=false;pendingLvUps=0;
  weatherT=0;flashT=0;camOX=0;camOY=0;
  playBgm('title');
}

function getMouse(e){
  // CSS 픽셀 좌표를 논리 좌표(LW×LH)로 변환
  const r=c.getBoundingClientRect();
  return {x:(e.clientX-r.left)*(LW/r.width),y:(e.clientY-r.top)*(LH/r.height)};
}
// 우클릭으로 컨텍스트 메뉴가 열리면 keyup 이벤트가 묻혀서 이동 키가 잠긴 채 유지되는 버그가 있음.
// 컨텍스트 메뉴를 막아서 keyup이 정상적으로 도착하게 함.
c.addEventListener('contextmenu',e=>{e.preventDefault();return false});
// 추가 안전장치: 윈도우/캔버스 포커스 잃을 때 눌린 키 전부 초기화
window.addEventListener('blur',()=>{for(const k in keys)keys[k]=false});
c.addEventListener('mouseleave',()=>{for(const k in keys)keys[k]=false});
c.addEventListener('mousemove',e=>{
  const m=getMouse(e);
  if(settingsOpen){
    hovSetBtn=getSettingsCloseAt(m.x,m.y);
    // 슬라이더 드래깅 처리
    if(dragSlider){
      const v=Math.max(0,Math.min(1,(m.x-dragSlider.x)/dragSlider.w));
      if(dragSlider.id==='bgm')setBgmVol(v);
      else if(dragSlider.id==='sfx')sfxVol=v;
      else if(dragSlider.id==='scale'){canvasScale=0.5+v*2.5;canvasAutoFit=false;applyCanvasScale()}
    }
    return;
  }
  // 일시정지 중 볼륨 슬라이더 드래깅
  if(paused&&state==='playing'&&dragSlider){
    const v=Math.max(0,Math.min(1,(m.x-dragSlider.x)/dragSlider.w));
    if(dragSlider.id==='bgm')setBgmVol(v);
    else if(dragSlider.id==='sfx')sfxVol=v;
  }
  if(state==='title')hovTitleBtn=getTitleBtnAt(m.x,m.y);
  if(state==='select')hovChar=getCharAt(m.x,m.y);
  if(state==='levelup')hovUI=getUpgradeAt(m.x,m.y);
});
c.addEventListener('mousedown',e=>{
  const m=getMouse(e);
  if(settingsOpen){
    const sl=getSliderAt(m.x,m.y);
    if(sl){
      dragSlider=sl;
      const v=Math.max(0,Math.min(1,(m.x-sl.x)/sl.w));
      if(sl.id==='bgm')setBgmVol(v);
      else if(sl.id==='sfx')sfxVol=v;
      else if(sl.id==='scale'){canvasScale=0.5+v*2.5;canvasAutoFit=false;applyCanvasScale()}
    }
    return;
  }
  // 일시정지 중 볼륨 슬라이더 클릭/드래그 시작
  if(paused&&state==='playing'){
    const psl=getPauseSliderAt(m.x,m.y);
    if(psl){
      dragSlider=psl;
      const v=Math.max(0,Math.min(1,(m.x-psl.x)/psl.w));
      if(psl.id==='bgm')setBgmVol(v);
      else if(psl.id==='sfx')sfxVol=v;
    }
  }
});
c.addEventListener('mouseup',()=>{dragSlider=null});
c.addEventListener('click',e=>{
  iac();
  const m=getMouse(e);
  // 설정 창이 열려 있으면 우선 처리
  if(settingsOpen){
    const sb=getSettingsCloseAt(m.x,m.y);
    if(sb===0){settingsOpen=false;hovSetBtn=-1}
    else if(sb===1){canvasAutoFit=!canvasAutoFit;if(canvasAutoFit)autoFitCanvas()}
    return;
  }
  // 윤소민 룰렛 결과 카드 클릭 → 변신 적용 + 게임 재개
  if(state==='playing'&&player&&player.awaitingClick&&player.cd.id==='sm'){
    player.streamerForm=player.rouletteResult;
    player.streamerT=30;
    player.awaitingClick=false;
    paused=false;  // 룰렛 중 실수로 P 눌러도 클릭 시 자동으로 일시정지 해제
    SFX.lvUp();
    if(player.streamerForm.id==='sleep')SFX.over();
    return;
  }
  if(state==='title'){
    const i=getTitleBtnAt(m.x,m.y);
    if(i===0){state='select';playBgm('title')}  // 게임 시작 → 캐릭 선택
    else if(i===1){settingsOpen=true}
    else{playBgm('title')}  // 빈 곳 클릭 - 사용자 인터랙션 트리거로 BGM 시작
    return;
  }
  if(state==='select'&&hovChar>=0)startGame(CHARS[hovChar]);
  if(state==='levelup'){const i=getUpgradeAt(m.x,m.y);if(i>=0){
    const choice=upgradeChoices[i];
    choice.fn(player);
    if(choice.tag==='무기 NEW')notify('⚔ 새 무기',choice.name,'#ff8844');
    else if(choice.tag==='아이템 NEW')notify('🎁 새 아이템',choice.name,'#88ccff');
    if(pendingLvUps>0){pendingLvUps--;triggerLvUp()}
    else state='playing';
  }}
  if(state==='dead'||state==='win')reset();
});

function update(dt){
  if(state!=='playing'){
    // 알림은 일시정지/레벨업 중에도 자연스럽게 사라지도록
    if(state==='levelup'){notifs.forEach(n=>{n.life-=dt;n.dead=n.life<=0});notifs=notifs.filter(n=>!n.dead)}
    return;
  }
  if(paused)return;
  // 룰렛 돌아갈 때 모든 게임 멈춤 (룰렛 진행만)
  if(player&&player.rouletteT>0&&player.cd.id==='sm'){
    player.rouletteT-=dt;
    if(player.rouletteT<=0){
      // 룰렛 끝 — 변신 적용은 클릭 후로 미룸
      player.rouletteT=0;
      player.awaitingClick=true;
      SFX.phialReady();
    }
    return;
  }
  // 룰렛 결과 카드 클릭 대기 중에도 게임 정지
  if(player&&player.awaitingClick&&player.cd.id==='sm')return;
  gameTime+=dt;
  afrT+=dt;if(afrT>0.18){afr++;afrT=0}
  player.update(dt);spawnEnemies(dt);
  if(!bossActive&&bossIdx<BDEFS.length&&gameTime>=BDEFS[bossIdx].t){boss=new Boss(BDEFS[bossIdx]);bossActive=true;bossIdx++;shake(0.4,6)}
  enemies.forEach(e=>e.update(dt));enemies=enemies.filter(e=>!e.dead);
  if(enemies.length>380)enemies=enemies.slice(enemies.length-380);
  if(boss){boss.update(dt);if(boss&&boss.dead)boss=null}
  // 컴패니언 (뭉치) 업데이트
  if(player.companions)player.companions.forEach(c=>c.update(dt));
  projs.forEach(p=>p.update(dt));projs=projs.filter(p=>!p.dead);
  if(projs.length>250)projs=projs.slice(projs.length-250);
  gems.forEach(g=>g.update(dt));gems=gems.filter(g=>!g.dead);
  parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.dead=p.life<=0});
  parts=parts.filter(p=>!p.dead);
  dmgTexts.forEach(d=>{d.y+=d.vy*dt;d.vy+=80*dt;d.life-=dt;d.dead=d.life<=0});
  dmgTexts=dmgTexts.filter(d=>!d.dead);
  if(dmgTexts.length>50)dmgTexts=dmgTexts.slice(-50);
  hitSparks.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.vx*=0.85;s.vy*=0.85;s.life-=dt;s.dead=s.life<=0});
  hitSparks=hitSparks.filter(s=>!s.dead);
  if(shakeT>0){shakeT-=dt;if(shakeT<=0)shakeM=0}
  // 픽업
  pickups.forEach(pk=>{
    pk.life-=dt;pk.fr+=dt*3;
    if(pk.life<=0){pk.dead=true;return}
    if(pk.t==='injection')return;  // 신경주사는 자석 흡수/자동 픽업 안 됨 (직접 가서 받아야)
    if(dist(pk,player)<player.magr*0.5){const a=Math.atan2(player.y-pk.y,player.x-pk.x);pk.x+=Math.cos(a)*180*dt;pk.y+=Math.sin(a)*180*dt}
    if(dist(pk,player)<16)applyPickup(pk);
  });
  pickups=pickups.filter(pk=>!pk.dead);
  // 콤보 타이머
  if(comboT>0){comboT-=dt;if(comboT<=0)combo=0}
  // 알림
  notifs.forEach(n=>{n.life-=dt;n.dead=n.life<=0});
  notifs=notifs.filter(n=>!n.dead);
  if(notifs.length>4)notifs=notifs.slice(-4);
  // 데칼
  decals.forEach(d=>{d.life-=dt;if(d.life<=0)d.dead=true});
  decals=decals.filter(d=>!d.dead);
  // 레벨업 버스트
  lvUpBursts.forEach(b=>{b.life-=dt;if(b.life<=0)b.dead=true});
  lvUpBursts=lvUpBursts.filter(b=>!b.dead);
  // 카메라 시선 선행 (이동 방향으로 살짝 앞 보기)
  const targX=player.facing.x*40,targY=player.facing.y*30;
  camOX+=(targX-camOX)*Math.min(1,dt*2.5);
  camOY+=(targY-camOY)*Math.min(1,dt*2.5);
  // 날씨
  updateWeather(dt);
}

function render(){
  // 매 프레임 변환 초기화 (논리 좌표계 유지)
  G.setTransform(G._scale||1,0,0,G._scale||1,0,0);
  G.fillStyle='#080808';G.fillRect(0,0,LW,LH);
  if(state==='title'){renderTitle();if(settingsOpen)renderSettings();return}
  if(state==='select'){renderSelect();if(settingsOpen)renderSettings();return}
  // 화면 흔들림 + 카메라 선행
  const sx=shakeT>0?rnd(-shakeM,shakeM):0,sy=shakeT>0?rnd(-shakeM,shakeM):0;
  const camX=LW/2-player.x-camOX+sx,camY=LH/2-player.y-camOY+sy;
  G.save();G.translate(camX,camY);
  drawWorld();
  // 데칼 (월드 배경 위, 모든 엔티티 아래)
  drawDecals();
  // 픽업 (배경 위)
  pickups.forEach(pk=>drawPickup(pk));
  gems.forEach(g=>g.draw());
  parts.forEach(p=>{G.save();G.globalAlpha=p.life/p.ml*0.9;G.fillStyle=p.col;G.fillRect(p.x-3,p.y-3,6,6);G.restore()});
  enemies.forEach(e=>e.draw());
  if(boss)boss.draw();
  projs.forEach(p=>p.draw());
  player.draw();
  // 컴패니언 (뭉치) 그리기 - 플레이어 위에
  if(player.companions)player.companions.forEach(c=>c.draw());
  // 히트 스파크
  hitSparks.forEach(s=>{
    const al=s.life/s.ml;
    G.save();G.globalAlpha=al;G.fillStyle=s.col;G.fillRect(s.x-1.5,s.y-1.5,3,3);
    G.globalAlpha=al*0.5;G.fillRect(s.x-3,s.y-3,6,6);G.restore();
  });
  // 데미지 숫자
  dmgTexts.forEach(d=>{
    const al=Math.min(1,d.life/d.ml*2);
    G.save();G.globalAlpha=al;G.font=`bold ${d.sz}px Courier New`;G.textAlign='center';
    if(d.crit){
      G.fillStyle='#000';G.fillText('CRIT!',d.x+1,d.y-d.sz+1);
      G.fillStyle='#ff9900';G.fillText('CRIT!',d.x,d.y-d.sz);
    }
    G.fillStyle='#000';G.fillText(d.t,d.x+1,d.y+1);
    G.fillStyle=d.c;G.fillText(d.t,d.x,d.y);
    G.restore();
  });
  // 레벨업 버스트
  drawLvUpBursts();
  G.restore();
  // 번개 플래시 (전체화면)
  if(flashT>0){G.fillStyle=`rgba(180,200,255,${flashT*0.7})`;G.fillRect(0,0,LW,LH)}
  // 비네팅
  const vg=G.createRadialGradient(LW/2,LH/2,LH*0.3,LW/2,LH/2,LH*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.55)');
  G.fillStyle=vg;G.fillRect(0,0,LW,LH);
  // HP 위험 시 가장자리 펄스
  if(player&&player.hp/player.mhp<0.25&&player.hp>0){
    const p=Math.sin(gameTime*7)*0.5+0.5;
    const dg=G.createRadialGradient(LW/2,LH/2,LH*0.3,LW/2,LH/2,LH*0.7);
    dg.addColorStop(0,'rgba(255,0,0,0)');dg.addColorStop(1,`rgba(255,0,0,${0.25+p*0.25})`);
    G.fillStyle=dg;G.fillRect(0,0,LW,LH);
  }
  // 피격 빨간 오버레이
  if(player&&player.flashT>0){G.fillStyle=`rgba(200,0,0,${player.flashT*0.45})`;G.fillRect(0,0,LW,LH)}
  // 기종 분노/휠체어 화면 비네팅
  if(player&&player.cd.id==='gj'){
    if(player.gjPhase==='rage'){
      const p=0.5+0.5*Math.sin(gameTime*10);
      const vg=G.createRadialGradient(LW/2,LH/2,LH*0.2,LW/2,LH/2,LH*0.65);
      vg.addColorStop(0,'rgba(255,0,68,0)');vg.addColorStop(1,`rgba(255,40,80,${0.35+p*0.2})`);
      G.fillStyle=vg;G.fillRect(0,0,LW,LH);
    }else if(player.gjPhase==='wheelchair'){
      const vg=G.createRadialGradient(LW/2,LH/2,LH*0.3,LW/2,LH/2,LH*0.7);
      vg.addColorStop(0,'rgba(40,80,160,0)');vg.addColorStop(1,'rgba(80,120,200,0.25)');
      G.fillStyle=vg;G.fillRect(0,0,LW,LH);
    }
  }
  drawHUD();
  drawPhialGauge();  // 차지 액스 페이얼 게이지 (좌하단 HUD)
  drawNerveInjectionArrow();  // 신경주사 화살표 (휠체어 모드)
  drawMinimap();
  drawCombo();
  drawNotifs();
  if(boss)boss.drawAnn();
  // 윤소민 룰렛 + 결과 카드
  drawRouletteAnim();
  drawResultCard();
  if(paused)drawPauseOverlay();
  if(state==='levelup')renderLevelUp();
  if(state==='dead')renderResult(false);
  if(state==='win')renderResult(true);
}

// 픽업 그리기 (월드 좌표계)
function drawPickup(pk){
  const bob=Math.sin(pk.fr)*2;
  G.save();
  shadow(pk.x,pk.y+8,7,2,0.4);
  // 본체
  if(pk.t==='heal'){
    G.fillStyle='#55cc55';G.fillRect(pk.x-7,pk.y-7+bob,14,14);
    G.fillStyle='#88ee88';G.fillRect(pk.x-7,pk.y-7+bob,14,2);G.fillRect(pk.x-7,pk.y-7+bob,2,14);
    G.fillStyle='#338833';G.fillRect(pk.x+5,pk.y-7+bob,2,14);G.fillRect(pk.x-7,pk.y+5+bob,14,2);
    G.fillStyle='#fff';G.fillRect(pk.x-1,pk.y-4+bob,2,8);G.fillRect(pk.x-4,pk.y-1+bob,8,2);
  }else if(pk.t==='magnet'){
    G.fillStyle='#bb3333';G.fillRect(pk.x-7,pk.y-6+bob,4,9);G.fillRect(pk.x+3,pk.y-6+bob,4,9);
    G.fillStyle='#666';G.fillRect(pk.x-7,pk.y-6+bob,14,3);
    G.fillStyle='#999';G.fillRect(pk.x-7,pk.y-6+bob,14,1);
    G.fillStyle='#fff';G.fillRect(pk.x-6,pk.y-5+bob,2,1);G.fillRect(pk.x+4,pk.y-5+bob,2,1);
    G.fillStyle='#444';G.fillRect(pk.x-7,pk.y+1+bob,4,2);G.fillRect(pk.x+3,pk.y+1+bob,4,2);
  }else if(pk.t==='bomb'){
    G.fillStyle='#1a1a1a';G.beginPath();G.arc(pk.x,pk.y+1+bob,7,0,Math.PI*2);G.fill();
    G.fillStyle='#333';G.beginPath();G.arc(pk.x-2,pk.y-1+bob,3,0,Math.PI*2);G.fill();
    G.fillStyle='#444';G.fillRect(pk.x-1,pk.y-9+bob,2,3);
    const fl=Math.sin(pk.fr*4)*0.5+0.5;
    G.fillStyle=fl>0.5?'#ffaa00':'#ff5500';G.fillRect(pk.x-1,pk.y-12+bob,2,3);
    G.fillStyle='#fff';G.fillRect(pk.x,pk.y-11+bob,1,1);
  }else if(pk.t==='injection'){
    // 💉 신경주사 — 펄스하는 흰빛 + 주사기 형태
    const pulse=0.5+0.5*Math.sin(pk.fr*2);
    G.globalAlpha=0.6+pulse*0.4;
    G.fillStyle='#88ffaa';
    G.beginPath();G.arc(pk.x,pk.y+bob,14+pulse*4,0,Math.PI*2);G.fill();
    G.globalAlpha=0.9;
    G.fillStyle='#aaffcc';
    G.beginPath();G.arc(pk.x,pk.y+bob,8,0,Math.PI*2);G.fill();
    G.globalAlpha=1;
    // 주사기 몸체 (수직)
    G.fillStyle='#fff';G.fillRect(pk.x-2,pk.y-6+bob,4,10);
    G.fillStyle='#88ccff';G.fillRect(pk.x-1,pk.y-5+bob,2,8);  // 액체
    // 플런저
    G.fillStyle='#cccccc';G.fillRect(pk.x-3,pk.y-8+bob,6,2);
    G.fillStyle='#888';G.fillRect(pk.x-2,pk.y-9+bob,4,1);
    // 바늘
    G.fillStyle='#ddd';G.fillRect(pk.x-0.5,pk.y+4+bob,1,4);
    // 십자가 (의료)
    G.fillStyle='#ff4444';G.fillRect(pk.x-3,pk.y-2+bob,6,1);G.fillRect(pk.x-0.5,pk.y-4+bob,1,5);
  }
  // 깜빡이는 곧 사라짐 표시
  if(pk.life<4&&Math.floor(pk.life*5)%2===0){G.globalAlpha=0.4;G.fillStyle='#fff';G.fillRect(pk.x-8,pk.y-9+bob,16,16);}
  G.restore();
}

// 미니맵 (우하단)
function drawMinimap(){
  const mw=110,mh=110,mx=LW-mw-10,my=LH-mh-10,scale=mw/3800;
  G.save();
  G.fillStyle='rgba(0,0,0,0.7)';G.fillRect(mx,my,mw,mh);
  G.strokeStyle='#444';G.lineWidth=1;G.strokeRect(mx,my,mw,mh);
  // 맵 경계
  G.strokeStyle='#660000';G.lineWidth=1;G.strokeRect(mx+1,my+1,mw-2,mh-2);
  const cx=mx+mw/2,cy=my+mh/2;
  // 적
  G.fillStyle='#ff4444';
  enemies.forEach(e=>{const ex=cx+e.x*scale,ey=cy+e.y*scale;if(ex>mx&&ex<mx+mw&&ey>my&&ey<my+mh)G.fillRect(ex-1,ey-1,2,2)});
  // 픽업
  G.fillStyle='#88ff88';
  pickups.forEach(pk=>{const px=cx+pk.x*scale,py=cy+pk.y*scale;if(px>mx&&px<mx+mw&&py>my&&py<my+mh){G.fillRect(px-2,py-2,4,4)}});
  // 보스
  if(boss){
    const bx=cx+boss.x*scale,by=cy+boss.y*scale;
    G.fillStyle='#ff0000';
    if(bx>mx&&bx<mx+mw&&by>my&&by<my+mh){
      const bl=Math.sin(gameTime*5)*0.5+0.5;
      G.fillStyle=`rgba(255,${30+bl*50},${30+bl*50},1)`;G.fillRect(bx-2,by-2,5,5);
    }else{
      // 화면 밖이면 화살표
      const dx=boss.x-player.x,dy=boss.y-player.y,a=Math.atan2(dy,dx);
      const ax=cx+Math.cos(a)*(mw/2-8),ay=cy+Math.sin(a)*(mh/2-8);
      G.save();G.translate(ax,ay);G.rotate(a);
      G.fillStyle='#ff2222';G.beginPath();G.moveTo(6,0);G.lineTo(-4,-4);G.lineTo(-4,4);G.closePath();G.fill();
      G.restore();
    }
  }
  // 플레이어 (중앙)
  G.fillStyle=player.cd.color;G.fillRect(cx-2,cy-2,4,4);
  G.fillStyle='#fff';G.fillRect(cx-1,cy-1,2,2);
  // 라벨
  G.fillStyle='#666';G.font='8px Courier New';G.textAlign='left';G.fillText('MAP',mx+4,my+10);
  G.restore();
}

// 콤보 카운터 (좌하단)
function drawCombo(){
  if(combo<3)return;
  G.save();
  const x=20,y=LH-30,sz=Math.min(16+combo*0.4,28);
  G.font=`bold ${sz}px Courier New`;G.textAlign='left';
  G.fillStyle='#000';G.fillText(`${combo} COMBO!`,x+2,y+2);
  const col=combo<10?'#ffdd66':combo<25?'#ff8844':'#ff2244';
  G.fillStyle=col;G.fillText(`${combo} COMBO!`,x,y);
  // 콤보 타이머 바
  G.fillStyle='#222';G.fillRect(x,y+3,90,3);
  G.fillStyle=col;G.fillRect(x,y+3,90*(comboT/2.5),3);
  G.restore();
}

// 알림 (우상단, 무기 패널 아래)
function drawNotifs(){
  G.save();
  const baseY=LH-150;
  notifs.forEach((n,i)=>{
    const fade=n.life<0.5?n.life*2:Math.min(1,(n.ml-n.life)*4);
    const slide=Math.min(1,(n.ml-n.life)*5);
    const x=LW-10-(1-slide)*40,y=baseY+i*40;  // 36→40 더 여유
    G.globalAlpha=fade*0.95;
    // 배경 (높이 32→36 — 한글 위 잘림 방지)
    G.fillStyle='rgba(0,0,0,0.85)';G.fillRect(x-180,y-22,180,36);
    G.fillStyle=n.col;G.fillRect(x-180,y-22,3,36);
    G.fillStyle=n.col+'33';G.fillRect(x-177,y-22,177,36);
    // 텍스트 (제목과 부제 y 조정)
    G.fillStyle=n.col;G.font='bold 11px Courier New';G.textAlign='left';
    G.fillText(n.title,x-170,y-6);
    G.fillStyle='#ccc';G.font='9px Courier New';
    G.fillText(n.sub,x-170,y+8);
  });
  G.restore();
}

// 일시정지 오버레이
const RECIPES=[
  ['🖥️ 램','🖥️ 보증서','⚡ 풀스펙','ram','warrant'],
  ['🔪 칼','🍖 레시피','🔥 풀코스','knife','recipe'],
  ['🔦 손전등','📋 일지','🌙 경계령','light','log'],
  ['🦯 지팡이','💊 진통제','💜 기종','staff','pill'],
  ['🐕 뭉치','🐕 목줄','🐕 언리쉬드','mungchi','leash'],
  ['🪓 슬액','☕ 아아','⚔ 개방','gsword','coffee'],
];
function drawPauseOverlay(){
  G.save();
  G.fillStyle='rgba(0,0,0,0.82)';G.fillRect(0,0,LW,LH);
  G.fillStyle='#ffdd66';G.font='bold 38px Courier New';G.textAlign='center';
  G.fillStyle='#000';G.fillText('⏸ PAUSED',LW/2+2,58);
  G.fillStyle='#ffdd66';G.fillText('⏸ PAUSED',LW/2,56);
  G.fillStyle='#aaa';G.font='11px Courier New';
  G.fillText('P / ESC 재개  ·  슬라이더로 볼륨 조절',LW/2,76);
  // 두 컬럼 빌드 표시 (압축)
  const colW=300,leftX=LW/2-colW-10,rightX=LW/2+10;
  const colH=240,colY=90;
  // 무기 컬럼
  G.fillStyle='rgba(20,20,30,0.85)';G.fillRect(leftX,colY,colW,colH);
  G.strokeStyle='#ff8866';G.lineWidth=1.5;G.strokeRect(leftX,colY,colW,colH);
  G.fillStyle='#ff8866';G.font='bold 12px Courier New';G.textAlign='left';
  G.fillText(`⚔ 무기 (${player.wpns.length}/${W_SLOTS})`,leftX+14,colY+18);
  for(let i=0;i<W_SLOTS;i++){
    const w=player.wpns[i],wy=colY+30+i*28;
    G.fillStyle='rgba(0,0,0,0.4)';G.fillRect(leftX+10,wy-2,colW-20,24);
    if(!w){G.fillStyle='#333';G.font='11px Courier New';G.fillText('(빈 슬롯)',leftX+18,wy+14);continue}
    const wd=WDEFS[w.type];if(!wd)continue;
    const maxed=wd.evolved||w.lv>=W_MAX_LV;
    G.fillStyle=wd.evolved?'#ffdd44':(maxed?'#ffaa44':'#fff');G.font='bold 11px Courier New';G.fillText(wd.name,leftX+18,wy+11);
    if(!wd.evolved){
      G.fillStyle='#222';G.fillRect(leftX+18,wy+15,170,4);
      G.fillStyle=maxed?'#ffdd44':'#ff8866';G.fillRect(leftX+18,wy+15,170*(w.lv/W_MAX_LV),4);
    }
    G.fillStyle=maxed?'#ffdd44':'#aaa';G.font='bold 10px Courier New';G.textAlign='right';
    G.fillText(wd.evolved?'★EVO':(maxed?'MAX':`L${w.lv}/${W_MAX_LV}`),leftX+colW-14,wy+15);
    G.textAlign='left';
  }
  // 아이템 컬럼
  G.fillStyle='rgba(20,20,30,0.85)';G.fillRect(rightX,colY,colW,colH);
  G.strokeStyle='#88ccff';G.lineWidth=1.5;G.strokeRect(rightX,colY,colW,colH);
  G.fillStyle='#88ccff';G.font='bold 12px Courier New';G.textAlign='left';
  G.fillText(`🎁 아이템 (${player.pCnt()}/${P_SLOTS})`,rightX+14,colY+18);
  const pIds=Object.keys(player.passives);
  for(let i=0;i<P_SLOTS;i++){
    const id=pIds[i],iy=colY+30+i*28;
    G.fillStyle='rgba(0,0,0,0.4)';G.fillRect(rightX+10,iy-2,colW-20,24);
    if(!id){G.fillStyle='#333';G.font='11px Courier New';G.fillText('(빈 슬롯)',rightX+18,iy+14);continue}
    const ps=PASSIVES.find(x=>x.id===id),lv=player.passives[id];
    if(!ps)continue;
    const maxed=lv>=P_MAX_LV;
    G.fillStyle=maxed?'#88ddff':'#fff';G.font='bold 11px Courier New';G.fillText(ps.name,rightX+18,iy+11);
    G.fillStyle='#222';G.fillRect(rightX+18,iy+15,170,4);
    G.fillStyle=maxed?'#88ddff':'#44aaff';G.fillRect(rightX+18,iy+15,170*(lv/P_MAX_LV),4);
    G.fillStyle=maxed?'#88ddff':'#aaa';G.font='bold 10px Courier New';G.textAlign='right';
    G.fillText(maxed?'MAX':`L${lv}/${P_MAX_LV}`,rightX+colW-14,iy+15);
    G.textAlign='left';
  }
  // ━━━ 진화 조합법 ━━━
  const rY=colY+colH+18;
  G.fillStyle='#ffaa66';G.font='bold 12px Courier New';G.textAlign='center';
  G.fillText('━━━ ✨ 진화 조합법 ━━━',LW/2,rY);
  G.fillStyle='#666';G.font='9px Courier New';
  G.fillText('무기 MAX + 페어 아이템 MAX → 레벨업 카드에서 진화 선택',LW/2,rY+12);
  RECIPES.forEach((r,i)=>{
    const col=i%2,row=Math.floor(i/2);
    const x=col*LW/2+20,y=rY+30+row*18;
    // 진행도 체크
    const w=player.wpns.find(ww=>ww.type===r[3]);
    const wLv=w?w.lv||0:0;
    const pLv=player.passives[r[4]]||0;
    const wMaxed=w&&wLv>=W_MAX_LV;
    const pMaxed=pLv>=P_MAX_LV;
    const evolvedRes=EVOS[r[3]]?.res;
    const done=player.wpns.some(ww=>ww.type===evolvedRes);
    let col1,col2,icon;
    if(done){col1='#88ff88';col2='#aaffaa';icon='✓'}
    else if(wMaxed&&pMaxed){col1='#ffdd44';col2='#ffeeaa';icon='★'}
    else if(w||pLv>0){col1='#aabbcc';col2='#ccddee';icon='▸'}
    else{col1='#555';col2='#777';icon='○'}
    G.fillStyle=col1;G.font='10px Courier New';G.textAlign='left';
    G.fillText(`${icon} `,x,y);
    G.fillStyle=w?col2:col1;G.fillText(r[0]+(w?` L${wLv}`:''),x+14,y);
    G.fillStyle=col1;G.fillText('+',x+95,y);
    G.fillStyle=pLv>0?col2:col1;G.fillText(r[1]+(pLv>0?` L${pLv}`:''),x+108,y);
    G.fillStyle=col1;G.fillText('→',x+200,y);
    G.fillStyle=col2;G.fillText(r[2],x+218,y);
  });
  // ━━━ 볼륨 슬라이더 ━━━ (ESC로 일시정지 후 조절 가능)
  const sliderY1=448, sliderY2=478, sliderSx=LW/2-140, sliderSw=280;
  // 섹션 라벨
  G.fillStyle='#aaa';G.font='9px Courier New';G.textAlign='center';
  G.fillText('━━━ 🔉 볼륨 조절 ━━━',LW/2,sliderY1-12);
  // BGM 슬라이더
  G.fillStyle='#fff';G.font='bold 10px Courier New';G.textAlign='left';
  G.fillText('🎵 BGM',sliderSx,sliderY1-2);
  G.fillStyle='#aaa';G.textAlign='right';G.fillText(`${Math.round(bgmVol*100)}%`,sliderSx+sliderSw,sliderY1-2);
  drawVolSlider(sliderSx,sliderY1+4,sliderSw,bgmVol,'#ff8844','bgm');
  // SFX 슬라이더
  G.fillStyle='#fff';G.font='bold 10px Courier New';G.textAlign='left';
  G.fillText('🔊 효과음',sliderSx,sliderY2-2);
  G.fillStyle='#aaa';G.textAlign='right';G.fillText(`${Math.round(sfxVol*100)}%`,sliderSx+sliderSw,sliderY2-2);
  drawVolSlider(sliderSx,sliderY2+4,sliderSw,sfxVol,'#44aaff','sfx');
  // 하단 통계
  G.fillStyle='#888';G.font='10px Courier New';G.textAlign='center';
  G.fillText(`Lv.${player.lv} · ${killCount} 처치 · 최대 콤보 ${comboMax} · 생존 ${String(Math.floor(gameTime/60)).padStart(2,'0')}:${String(Math.floor(gameTime%60)).padStart(2,'0')}`,LW/2,LH-12);
  G.restore();
}
// 일시정지 화면 볼륨 슬라이더 클릭 감지
function getPauseSliderAt(mx,my){
  if(!paused||state!=='playing')return null;
  const sx=LW/2-140, sw=280;
  if(mx>=sx-10&&mx<=sx+sw+10){
    if(my>=448&&my<=460)return {id:'bgm',x:sx,w:sw};
    if(my>=478&&my<=490)return {id:'sfx',x:sx,w:sw};
  }
  return null;
}

function loop(ts){const dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;update(dt);render();requestAnimationFrame(loop)}
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop)});
</script></body></html>
